[alembic]
# Path relativo al archivo `.ini` — alembic/ vive al lado.
script_location = alembic

# URL de default — se sobrescribe en `env.py` si viene engine externo.
sqlalchemy.url = sqlite:///data/scanner.db

# Timezone para los timestamps de los archivos de revisión (nombre).
# ET para consistencia con ADR-0002 (aunque aquí sólo afecta el filename).
timezone = America/New_York

# Plantilla del nombre de archivo de revisión — orden lexicográfico
# con fecha + slug.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Dónde se encuentran las migraciones (relative to script_location).
version_locations = %(here)s/alembic/versions

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
