function renderDP(){
  const p=$("dp");if(!SEL||!RES?.[SEL]||RES[SEL].error){p.style.display="none";return}
  const d=RES[SEL],s=d.scoring;p.style.display="block";
  const tI=t=>t==="bullish"?"▲ ALCISTA":t==="bearish"?"▼ BAJISTA":"◆ NEUTRAL";
  const tC=t=>t==="bullish"?"tb":t==="bearish"?"tr_":"tn_";

  let h=`<div class="dph"><div><div class="dpt">${d.t}</div><div class="dpn">${d.n}</div></div><button class="dpx" onclick="selTk(null)">✕</button></div>
    <div class="dpp"><span class="dppr">$${d.ind.price.toFixed(2)}</span><span style="font-size:14px;font-weight:600" class="${d.chg>0?"cp_":d.chg<0?"cn":"cfl"}">${d.chg>0?"+":""}${d.chg}%</span></div>`;

  if(d.needsCat){
    const reasons=[];
    if(Math.abs(d.chg)>d.catThreshold)reasons.push(`Chg ${Math.abs(d.chg)}% > umbral ${d.catThreshold}%`);
    if(d.divSPY)reasons.push(`Divergencia vs SPY`);
    h+=`<div class="ab ab-c">⚡ ${reasons.join(" + ")} — PROTOCOLO CATALIZADOR</div>`;
  }
  if(d.divSPY)h+=`<div class="ab ab-d${d.divSPY.type==="bearish"?"b":"u"}">📊 Div SPY: ${d.t} ${d.divSPY.a>0?"+":""}${d.divSPY.a}% vs SPY ${d.divSPY.spy>0?"+":""}${d.divSPY.spy}%</div>`;
  if(d.ind.bbSqH?.isSqueeze)h+=`<div class="ab ab-sq">🔮 BB Squeeze 1H — ancho en percentil ${d.ind.bbSqH.percentile}%${d.ind.bbSqH.isExpanding?" — EXPANSIÓN en curso (ruptura inminente)":""}</div>`;

  // LAYERED SCORING BREAKDOWN
  // Build trigger and risk detail lists
  const triggerPats=d.patterns.filter(p=>p.cat==="TRIGGER");
  const riskPats=d.patterns.filter(p=>p.cat==="RISK");
  const confirmPats=d.patterns.filter(p=>p.cat==="CONFIRM"||p.cat==="SQUEEZE");

  const triggerDetails=triggerPats.length?triggerPats.map(p=>`<div style="display:flex;gap:6px;padding:3px 0 3px 16px;font-size:10px"><span class="pbdg pb-${p.sg}" style="font-size:8px">${p.tf}</span><span style="color:#c8cdd5;flex:1">${p.d}</span><span style="color:#4a5568">w:${p.w}</span></div>`).join(""):"<div style='padding:3px 16px;font-size:10px;color:#334155'>Ninguno</div>";
  const riskDetails=riskPats.length?riskPats.map(p=>`<div style="display:flex;gap:6px;padding:3px 0 3px 16px;font-size:10px"><span class="pbdg pb-WARN" style="font-size:8px">${p.tf}</span><span style="color:#c8cdd5;flex:1">${p.d}</span><span style="color:#ef4444">w:${p.w}</span></div>`).join(""):"<div style='padding:3px 16px;font-size:10px;color:#334155'>Ninguno</div>";
  const confirmDetails=confirmPats.length?confirmPats.map(p=>`<div style="display:flex;gap:6px;padding:3px 0 3px 16px;font-size:10px"><span class="pbdg pb-${p.sg}" style="font-size:8px">${p.tf}</span><span style="color:#c8cdd5;flex:1">${p.d}</span><span style="color:#4a5568">w:${p.w}</span></div>`).join(""):"";

  // SCORING POR CAPAS — fórmula motor V5 + qqq_canonical_v1.
  // score = trigger_sum + confirm_sum (H-02). Vol/Hora/Bonus son CONTEXTO informativo,
  // NO entran al cálculo. Risks no restan; el conflict gate sí bloquea.
  const sCls=s.score>=14?"lv-pass":s.score>=7?"lv-pass":s.score>=4?"lv-warn":"lv-fail";
  const ctxBits=[];
  ctxBits.push(`Vol ×${s.layers.confirm.volMult}`);
  ctxBits.push(`Hora ×${s.timeW.w} (${s.timeW.label})`);
  if(s.layers.confirm.bonus)ctxBits.push(`Bonus +${s.layers.confirm.bonus}`);
  h+=`<div style="margin-bottom:14px"><div class="st">SCORING V5 · capas</div><div class="layer-box">
    <div class="layer-row"><span class="layer-lbl">① Estructura</span><span class="layer-val ${s.layers.structure.pass?"lv-pass":"lv-fail"}">${s.layers.structure.pass?"✓":"✗"} ${s.layers.structure.reason}</span></div>
    <div class="layer-row" style="cursor:pointer" onclick="const el=document.getElementById('trig-detail');el.style.display=el.style.display==='none'?'block':'none';this.querySelector('.arrow').textContent=el.style.display==='none'?'▸':'▾'"><span class="layer-lbl"><span class="arrow" style="font-size:10px;margin-right:3px">▸</span>② Triggers (suma)</span><span class="layer-val ${s.layers.trigger.pass?"lv-pass":"lv-fail"}">${s.layers.trigger.count} × ${s.layers.trigger.sum.toFixed(1)} pts</span></div>
    <div id="trig-detail" style="display:none;border-left:2px solid #a855f730;margin:2px 0 4px 0">${triggerDetails}</div>
    ${confirmPats.length?`<div class="layer-row" style="cursor:pointer" onclick="const el=document.getElementById('conf-detail');el.style.display=el.style.display==='none'?'block':'none';this.querySelector('.arrow').textContent=el.style.display==='none'?'▸':'▾'"><span class="layer-lbl"><span class="arrow" style="font-size:10px;margin-right:3px">▸</span>③ Confirms (suma)</span><span class="layer-val lv-pass">+${s.layers.confirm.sum}</span></div><div id="conf-detail" style="display:none;border-left:2px solid #3b82f630;margin:2px 0 4px 0">${confirmDetails}</div>`:`<div class="layer-row"><span class="layer-lbl">③ Confirms (suma)</span><span class="layer-val" style="color:#4a5568">0</span></div>`}
    <div class="layer-row" style="${riskPats.length?"cursor:pointer":""}" ${riskPats.length?`onclick="const el=document.getElementById('risk-detail');el.style.display=el.style.display==='none'?'block':'none';this.querySelector('.arrow').textContent=el.style.display==='none'?'▸':'▾'"`:``}><span class="layer-lbl">${riskPats.length?'<span class="arrow" style="font-size:10px;margin-right:3px">▸</span>':""}④ Risks <span style="color:#4a5568;font-size:10px">(no restan)</span></span><span class="layer-val ${riskPats.length?"lv-warn":"lv-pass"}">${riskPats.length} (info ${s.layers.risk.sum})${s.layers.risk.blocked?" ⛔BLOQUEADO":""}${s.layers.risk.conflictInfo&&!s.layers.risk.blocked?` · conflicto PUT:${s.layers.risk.conflictInfo.put}/CALL:${s.layers.risk.conflictInfo.call} diff:${s.layers.risk.conflictInfo.diff.toFixed(1)}`:""}</span></div>
    ${riskPats.length?`<div id="risk-detail" style="display:none;border-left:2px solid #ef444430;margin:2px 0 4px 0">${riskDetails}</div>`:""}
    <div class="layer-row" style="border-top:1px dashed #334155;padding-top:5px;margin-top:3px;color:#64748b;font-size:10px"><span class="layer-lbl">Contexto (no entra al score)</span><span class="layer-val" style="color:#64748b;font-weight:500">${ctxBits.join(" · ")}</span></div>
    <div class="layer-row" style="border-top:1px solid #334155;padding-top:6px;margin-top:4px"><span class="layer-lbl" style="font-weight:700">SCORE V5 = T+C</span><span class="layer-val ${sCls}" style="font-size:14px">${s.layers.trigger.sum.toFixed(1)} + ${s.layers.confirm.sum} = <b>${s.score}</b> → <span class="${confClass(s.conf)}">${s.conf}</span></span></div>
  </div></div>`;

  if(s.blocked)h+=`<div class="ab" style="background:#ef444410;border:1px solid #ef444430;color:#ef4444">⛔ ${s.blocked}</div>`;

  // ALIGNMENT
  h+=`<div style="margin-bottom:14px"><div class="st">ALINEACIÓN</div>`;
  [{l:"15M",v:d.tM},{l:"1H",v:d.tH},{l:"Diario",v:d.tD}].forEach(x=>{h+=`<div class="ar"><span class="al">${x.l}</span><span class="av ${tC(x.v)}">${tI(x.v)}</span></div>`});
  h+=`</div>`;

  // KEY LEVELS
  h+=`<div style="margin-bottom:14px"><div class="st">NIVELES CLAVE</div><div class="lvl-box">`;
  if(d.kLvls.r.length){h+=`<div style="font-size:10px;color:#ef4444;margin-bottom:4px;font-weight:600">RESISTENCIAS</div>`;d.kLvls.r.forEach(l=>{h+=`<div class="lvl-row"><span class="lvl-r">$${l.p}</span><span class="lvl-k">${l.l}</span></div>`})}
  if(d.kLvls.s.length){h+=`<div style="font-size:10px;color:#22c55e;margin:${d.kLvls.r.length?8:0}px 0 4px;font-weight:600">SOPORTES</div>`;d.kLvls.s.forEach(l=>{h+=`<div class="lvl-row"><span class="lvl-s">$${l.p}</span><span class="lvl-k">${l.l}</span></div>`})}
  h+=`</div></div>`;

  // INDICATORS
  h+=`<div style="margin-bottom:14px"><div class="st">INDICADORES</div><div class="ig">`;
  [{l:"Vol 15M ✓",v:`${d.ind.volM}x`,hot:d.ind.volM>1.5},{l:"Vol 1H ✓",v:`${d.ind.volH}x`,hot:d.ind.volH>1.5},
   {l:"Vol actual",v:d.ind.volProjM?`${d.ind.volProjM.projected}x (${d.ind.volProjM.confidence})`:"—",hot:false},
   {l:"ATR",v:d.ind.atrPct?`${d.ind.atrPct}%`:"—"},
   {l:"dMA200",v:d.ind.dMA200!==null?`${d.ind.dMA200>0?"+":""}${d.ind.dMA200}%`:"—"},
   {l:"MA20 D",v:d.ind.ma20D?`$${d.ind.ma20D}`:"—"},
   {l:"BB↑1H",v:d.ind.bbH?`$${d.ind.bbH.u}`:"—"},{l:"BB↓1H",v:d.ind.bbH?`$${d.ind.bbH.l}`:"—"},
   {l:"GAP",v:d.ind.gap?`${d.ind.gap.pct>0?"+":""}${d.ind.gap.pct}%${d.ind.gap.significant?" ⚡":""}`:"—",hot:d.ind.gap?.significant},
   {l:"ORB",v:d.ind.orb?`$${d.ind.orb.low}-$${d.ind.orb.high}`:"—",hot:d.ind.orb?.breakUp||d.ind.orb?.breakDown}
  ].forEach(x=>{h+=`<div class="ic"><div class="icl">${x.l}</div><div class="icv${x.hot?" hot":""}">${x.v}</div></div>`});
  h+=`</div></div>`;

  if(d.secRel){h+=`<div style="margin-bottom:14px"><div class="st">FUERZA RELATIVA</div><div class="srb"><span style="color:#94a3b8">vs ${d.secRel.tk}: </span><span style="color:${d.secRel.diff>0?"#22c55e":d.secRel.diff<0?"#ef4444":"#4a5568"};font-weight:700">${d.secRel.diff>0?"+":""}${d.secRel.diff}%</span></div></div>`}

  // PATTERNS
  h+=`<div style="margin-bottom:14px"><div class="st">PATRONES (${d.patterns.length})</div>`;
  if(!d.patterns.length)h+=`<div style="color:#334155;font-size:12px">Sin patrones</div>`;
  else d.patterns.forEach(p=>{
    const catClass=p.cat==="TRIGGER"?"TRIGGER":p.cat==="RISK"?"RISK":p.sg;
    h+=`<div class="prow"><span class="pbdg pb-${catClass}">${p.tf}</span><span class="pd">${p.d}${p.age>0?`<span class="tag tag-decay">-${((1-decayW(p.age))*100).toFixed(0)}%</span>`:""}</span><span class="pw">${p.w>0?"+":""}${p.w}</span></div>`;
  });
  h+=`</div>`;

  // MÉTRICAS BACKTEST · QQQ canonical v1 — siempre visible (única calibración).
  // Banda actual resaltada con clase `cur` SOLO si el ticker es QQQ (calibración aplica
  // numéricamente sobre QQQ; en otros tickers los pesos del fixture se usan pero las métricas
  // históricas no son del ticker mostrado).
  const orderedBands=["S+","S","A+","A","B","REVISAR"];
  const isQQQ=d.t==="QQQ";
  let metricsRows="";
  for(const b of orderedBands){
    const m=METRICS.by_band[b];
    if(!m)continue;
    const isCur=isQQQ&&s.conf===b;
    metricsRows+=`<tr${isCur?' class="cur"':""}><td class="${confClass(b)}">${b}</td><td>${m.wr_pct}%</td><td>${m.mfe_mae}</td><td>${m.n.toLocaleString()}</td></tr>`;
  }
  h+=`<div style="margin-bottom:14px"><div class="st">MÉTRICAS BACKTEST · QQQ canonical v1</div>
    <table class="metrics-tbl">
      <thead><tr><th>BANDA</th><th>WR%</th><th>MFE/MAE</th><th>n</th></tr></thead>
      <tbody>${metricsRows}</tbody>
    </table>
    <div class="metrics-note">${METRICS.training_signals_total.toLocaleString()} señales QQQ · ${METRICS.training_months} meses · spread B→S+ ${METRICS.spread_b_to_splus_pp} pp.${isQQQ?` Banda actual <b class="${confClass(s.conf)}">${s.conf}</b> resaltada.`:` Pesos del fixture aplican a ${d.t}; las métricas históricas son específicas de QQQ.`}</div>
  </div>`;

  h+=`<button class="bcd" id="cpD" onclick="cpOne('${d.t}',1)">📋 COPIAR ANÁLISIS → CLAUDE</button>`;
  h+=`<div class="pvb"><div style="color:#334155;margin-bottom:4px">Texto para Claude:</div>${genCT(d).replace(/\n/g,"<br>")}</div>`;
  p.innerHTML=h;
}

function setF(f){FLT=f;render()}
function selTk(t){SEL=SEL===t?null:t;render()}
function cpOne(t,det){if(!RES?.[t])return;navigator.clipboard.writeText(genCT(RES[t])).then(()=>{const el=det?$("cpD"):$(`c-${t}`);if(el){el.classList.add("cp");el.textContent=det?"✓ COPIADO":"✓";setTimeout(()=>{el.classList.remove("cp");el.textContent=det?"📋 COPIAR ANÁLISIS → CLAUDE":"📋"},2000)}})}
function cpAll(){if(!RES)return;const ss=Object.values(RES).filter(d=>!d.error&&(d.scoring.signal==="SETUP"||d.scoring.signal==="REVISAR"));if(!ss.length)return;const txt=`SCAN ${new Date().toLocaleString()}\n${"=".repeat(50)}\n\n`+ss.map(d=>genCT(d)).join(`\n\n${"-".repeat(40)}\n\n`);navigator.clipboard.writeText(txt).then(()=>{const el=$("bcaBtn");if(el){el.classList.add("cp");el.textContent="✓ COPIADO";setTimeout(()=>{el.classList.remove("cp");el.textContent="📋 COPIAR SETUPS → CLAUDE"},2000)}})}
async function doScan(){if(BUSY)return;BUSY=true;$("bScan").disabled=true;$("bScan").textContent="ESCANEANDO...";$("dot").className="dot run";$("empty").style.display="none";$("err").style.display="none";$("cnt").style.display="none";$("sbar").style.display="none";RES=null;SEL=null;try{const raw=await fetchAll();RES=analyzeAll(raw);$("lScan").textContent="Scan: "+new Date().toLocaleTimeString();$("dot").className="dot ok";$("cnt").style.display="flex";render()}catch(e){$("err").textContent="❌ "+(e.message||"Error");$("err").style.display="block";$("dot").className="dot"}$("prg").style.display="none";$("bScan").disabled=false;$("bScan").textContent="⟳ ESCANEAR";BUSY=false}
</script>
</body>
</html>
