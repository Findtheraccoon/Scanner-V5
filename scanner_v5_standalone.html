<script>
// ═══════════════════════════════════════
// FIXTURE CANONICAL — qqq_canonical_v1 (engine V5 calibration)
// ═══════════════════════════════════════
// Embedded from backend/fixtures/qqq_canonical_v1.json — file_hash_sha256 referencia:
// 4927abaa7177235a42f38f368a384d1cb1bae49ec7f3c1db2c0d8c52758f57ac
// Calibrado sobre 6519 señales QQQ en 773 sesiones (2023-03-15 a 2026-04-14).
// NO MODIFICAR sin replay completo y aprobación del trader.
const FIXTURE={
  fixture_id:"qqq_canonical_v1",
  fixture_version:"5.2.0",
  engine_compat_range:">=5.2.0,<6.0.0",
  ticker_calibrated:"QQQ",
  benchmark:"SPY",
  confirm_weights:{
    BBinf_1H:3, BBinf_D:1, BBsup_1H:1, BBsup_D:1,
    DivSPY:1, FzaRel:4, Gap:1, SqExp:0,
    VolHigh:2, VolSeq:0
  },
  detection_thresholds:{
    divspy_asset_threshold_pct:0.5,
    divspy_spy_threshold_pct:0.3,
    fzarel_min_divergence_pct:0.5,
    volhigh_min_ratio:1.2
  },
  // Bandas de signal: array ordenado de mayor a menor min. signal: SETUP | REVISAR
  // resolve_band(score) recorre el array y devuelve la primera banda donde score >= min
  // y (max==null o score<max). Score < 2 → NEUTRAL implícito.
  score_bands:[
    {label:"S+", min:16.0, max:null, signal:"SETUP"},
    {label:"S",  min:14.0, max:16.0, signal:"SETUP"},
    {label:"A+", min:10.0, max:14.0, signal:"SETUP"},
    {label:"A",  min:7.0,  max:10.0, signal:"SETUP"},
    {label:"B",  min:4.0,  max:7.0,  signal:"REVISAR"},
    {label:"REVISAR", min:2.0, max:4.0, signal:"REVISAR"}
  ]
};

// ═══════════════════════════════════════
// METRICS CANONICAL — qqq_canonical_v1.metrics.json (overlay estadístico)
// ═══════════════════════════════════════
// WR%/MFE-MAE/n por banda — APLICA SOLO A QQQ (calibrado sobre QQQ).
// En otros tickers se muestra el chip de banda sin overlay estadístico.
const METRICS={
  ticker:"QQQ",
  training_months:36,
  training_sessions:773,
  training_signals_total:6519,
  spread_b_to_splus_pp:24.2,
  by_band:{
    "S+":{wr_pct:72.7, mfe_mae:1.60, n:11},
    "S": {wr_pct:60.8, mfe_mae:4.35, n:51},
    "A+":{wr_pct:59.5, mfe_mae:7.19, n:674},
    "A": {wr_pct:54.9, mfe_mae:6.36, n:1759},
    "B": {wr_pct:48.5, mfe_mae:10.37, n:2413},
    "REVISAR":{wr_pct:50.9, mfe_mae:7.18, n:1611}
  }
};

let KEYS=["6213e4f982ae4b4184e8715a95f3a047","cfeee46d3f9f48d19bc97a722b38d02b","","42a0a1582bca4e649ed69ad68d17d98b",""];
let CREDITS=[8,8,8,8,8];
// Watchlist: 5 fijos calibrados + 1 libre (default XBI).
let WL=[{t:"SPY",n:"S&P 500 ETF",s:"INDEX"},{t:"QQQ",n:"Nasdaq 100 ETF",s:"TECH"},{t:"IWM",n:"Russell 2000 ETF",s:"SMALLCAP"},{t:"AAPL",n:"Apple Inc",s:"TECH"},{t:"NVDA",n:"NVIDIA Corp",s:"TECH"},{t:"XBI",n:"Biotech ETF",s:"BIOTECH"}];
const BENCH={QQQ:"SPY",IWM:"SPY",AAPL:"QQQ",NVDA:"QQQ",XBI:"SPY",XLE:"SPY",SPY:null};
let RES=null,SEL=null,FLT="ALL",BUSY=false;
const $=id=>document.getElementById(id),sl=ms=>new Promise(r=>setTimeout(r,ms));

setInterval(updET,30000);updET();
function toggleCfg(){const e=$("cfg");e.style.display=e.style.display==="block"?"none":"block"}
function saveCfg(){
  KEYS=[1,2,3,4,5].map(i=>$("key"+i).value.trim());
  CREDITS=[1,2,3,4,5].map(i=>Math.max(1,parseInt($("cr"+i).value)||8));

  WL=t.map(x=>({t:x,n:x,s:"CUSTOM"}));

}
function getActiveKeys(){return KEYS.map((k,i)=>({key:k,credits:CREDITS[i]})).filter(x=>x.key&&x.key.length>10)}

// ═══════════════════════════════════════
// AGGREGATOR 1min → 1H (Observatory-style, port de backend/engines/scoring/aggregator.py)
// ═══════════════════════════════════════
// Bucket key = (date, hour). Al cambio de fecha el bucket en construcción se descarta
// (replica reset_day() del CandleBuilder de Observatory) — la última hora del día anterior
// (típicamente 15:xx en mercado US) NO persiste en el historial 1H.
// dt de la vela agregada = dt de la primera 1min del bucket (no HH:00 round): primera vela
// del día queda con dt = "YYYY-MM-DD 09:30:00".
// Crítico para paridad con motor V5 + canonical QQQ v1 — gotcha #16 de CLAUDE.md.
function _aggBucket(b){
  return{
    dt:b[0].dt,
    o:b[0].o,
    h:Math.max(...b.map(c=>c.h)),
    l:Math.min(...b.map(c=>c.l)),
    c:b[b.length-1].c,
    v:b.reduce((a,c)=>a+c.v,0)
  };
}
function aggTo1H(c1m){
  if(!c1m||!c1m.length)return[];
  const result=[];
  let curKey=null,bucket=[];
  for(const c of c1m){
    if(!c.dt)continue;
    const date=c.dt.slice(0,10);
    const hour=parseInt(c.dt.slice(11,13));
    const key=date+"|"+hour;
    if(curKey!==null&&key!==curKey){
      const prevDate=curKey.split("|")[0];
      if(prevDate===date){
        // Misma fecha → cerrar bucket previo y push.
        result.push(_aggBucket(bucket));
      }
      // Cambio de fecha → descartar bucket previo (reset_day).
      bucket=[];
    }
    curKey=key;
    bucket.push(c);
  }
  // Bucket final parcial OK (include_partial=true por default).
  if(bucket.length)result.push(_aggBucket(bucket));
  return result;
}

// ═══════════════════════════════════════

// ═══════════════════════════════════════
async function fetchTS(sym,iv,sz,key){const r=await fetch(`https://api.twelvedata.com/time_series?symbol=${sym}&interval=${iv}&outputsize=${sz}&apikey=${key}`);if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json()}
function parseC(data,single){const R={};if(single&&data.values){R[single]=data.values.map(v=>({o:+v.open,h:+v.high,l:+v.low,c:+v.close,v:parseInt(v.volume)||0,dt:v.datetime})).reverse();return R}for(const k of Object.keys(data)){const d=data[k];if(!d||d.status==="error"||!d.values)continue;R[k]=d.values.map(v=>({o:+v.open,h:+v.high,l:+v.low,c:+v.close,v:parseInt(v.volume)||0,dt:v.datetime})).reverse()}return R}
function setPrg(s,t,l,w){$("prg").style.display="block";$("pFill").style.width=`${(s/t)*100}%`;$("pFill").className="prg-fill"+(w?" w":"");$("pStep").textContent=`${s}/${t}`;$("pLbl").textContent=l;$("pLbl").className="prg-lbl"+(w?" w":"")}
async function fetchRetry(sym,iv,sz,key,lbl,step,total){let att=0;while(att<3){try{setPrg(step,total,lbl,false);const j=await fetchTS(sym,iv,sz,key);if(j.code===429||(j.status==="error"&&j.message?.includes("minute"))){att++;for(let s=62;s>0;s--){setPrg(step,total,`Límite API — ${s}s (${att}/3)`,true);await sl(1000)}continue}if(j.status==="error")throw new Error(j.message);return j}catch(e){att++;if(att>=3)throw e;await sl(3000)}}}

async function fetchAll(){
  const tks=WL.map(w=>w.t);
  // 1H ya NO se pide a TD: se agrega en local desde 1min para matchear convención
  // Observatory-style (open-stamped desde 09:30, reset al cambio de día). outputsize=5000
  // de 1min ≈ 12.8 días de mercado → suficiente para MA40 1H (40h ≈ 6.15 días) + BB squeeze
  // sobre ventana de 20 buckets.
  const ivs=[{k:"D",i:"1day",sz:210,l:"diarios"},{k:"m",i:"1min",sz:5000,l:"1min (→agg 1H)"},{k:"M",i:"15min",sz:50,l:"15min"}];
  const keys=getActiveKeys();
  const nKeys=keys.length;
  const raw={};

  // Credit-aware distribution: keys with more credits get more symbols
  // Each symbol costs 3 credits (3 timeframes batched as 1 call each, but multi-symbol = 1 credit per symbol in batch)
  // Actually: each batch call = 1 credit per symbol in the batch. 3 timeframe rounds = symbols_in_group × 3 credits
  function distributeByCredits(symbols,activeKeys){
    const groups=activeKeys.map(()=>[]);
    const totalCredits=activeKeys.reduce((a,k)=>a+k.credits,0);
    // Sort symbols into groups weighted by credit capacity
    let assigned=0;
    activeKeys.forEach((k,ki)=>{
      const share=Math.round(symbols.length*k.credits/totalCredits);
      const take=ki===activeKeys.length-1?symbols.length-assigned:Math.min(share,symbols.length-assigned);
      for(let j=0;j<take;j++)groups[ki].push(symbols[assigned++]);
    });
    return groups;
  }

  const groups=distributeByCredits(tks,keys);
  // Check per-key if delay needed (symbols×3 > key credits)
  const anyNeedsDelay=groups.some((g,i)=>g.length*3>keys[i].credits);
  const delayBetween=anyNeedsDelay?1500:300;

  const keyInfo=nKeys>1?` (${nKeys} keys${anyNeedsDelay?", con pausa":""})`:"";

  for(let i=0;i<ivs.length;i++){
    const iv=ivs[i];
    setPrg(i+1,4,`${iv.l}${keyInfo}...`,false);

    const promises=groups.map((grp,gi)=>{
      if(!grp.length)return Promise.resolve({});
      const sym=grp.join(",");
      const sgl=grp.length===1?grp[0]:null;
      return fetchRetry(sym,iv.i,iv.sz,keys[gi].key,`K${gi+1}:${iv.l}`,i+1,4)
        .then(json=>parseC(json,sgl));
    });

    const results=await Promise.all(promises);
    raw[iv.k]={};
    results.forEach(r=>Object.assign(raw[iv.k],r));

    if(i<2)await sl(delayBetween);
  }

  // Agregación local 1min → 1H Observatory-style (reset al cambio de día).
  setPrg(4,4,"Agregando 1min → 1H...",false);
  raw.H={};
  for(const t of tks){
    if(raw.m&&raw.m[t]&&raw.m[t].length)raw.H[t]=aggTo1H(raw.m[t]);
  }
  delete raw.m; // libera memoria del 1min crudo (puede ser 4-5 MB)

  setPrg(4,4,"Analizando...",false);
  return raw;
}

function _ma(c,p){if(!c||c.length<p)return null;return+(c.slice(-p).reduce((a,x)=>a+x.c,0)/p).toFixed(2)}
function _bb(c,p=20,m=2){if(!c||c.length<p)return null;const s=c.slice(-p),mn=s.reduce((a,x)=>a+x.c,0)/p,st=Math.sqrt(s.reduce((a,x)=>a+(x.c-mn)**2,0)/p);return{u:+(mn+m*st).toFixed(2),m:+mn.toFixed(2),l:+(mn-m*st).toFixed(2),w:+(2*m*st).toFixed(2)}}
// Volume ratio — uses PENULTIMATE candle (completed) vs MEDIAN of today's completed candles
// For intraday TFs (15M, 1H): only same-day candles for apples-to-apples comparison
// If <3 completed candles today → neutral (1.0) to avoid unreliable medians
// Median eliminates outliers (opening candle 9:30 with 3-5x normal volume)
function _median(arr){
  if(!arr.length)return 0;
  const s=[...arr].sort((a,b)=>a-b);
  const mid=Math.floor(s.length/2);
  return s.length%2?s[mid]:(s[mid-1]+s[mid])/2;
}
function _todayCandles(c){
  if(!c||!c.length)return[];
  const lastDt=c[c.length-1].dt;
  if(!lastDt)return c;
  const today=lastDt.split(" ")[0]||lastDt.split("T")[0];
  return c.filter(x=>x.dt&&x.dt.startsWith(today));
}
function _vr(c,todayOnly=false){
  if(todayOnly){
    const tc=_todayCandles(c);
    if(tc.length<4)return 1; // <3 completed + 1 current → neutral
    const completed=tc[tc.length-2];
    const vols=tc.slice(0,-2).map(x=>x.v);
    const med=_median(vols);
    return med>0?+(completed.v/med).toFixed(2):1;
  }
  // Daily fallback: original 10-period logic
  if(!c||c.length<12)return 1;
  const completed=c[c.length-2];
  const vols=c.slice(-12,-2).map(x=>x.v);
  const med=_median(vols);
  return med>0?+(completed.v/med).toFixed(2):1;
}
// Projected volume of current (incomplete) candle — informational only, no scoring impact
function _vrProjected(c,intervalMins,todayOnly=false){
  if(todayOnly){
    const tc=_todayCandles(c);
    if(tc.length<4)return null; // need >=3 completed for meaningful median
    const vols=tc.slice(0,-1).map(x=>x.v);
    const med=_median(vols);
    if(med<=0)return null;
    const currentVol=tc[tc.length-1].v;
    const rawRatio=currentVol/med;
    if(rawRatio>=0.5)return{projected:+rawRatio.toFixed(2),raw:currentVol,confidence:"high"};
    return{projected:+rawRatio.toFixed(2),raw:currentVol,confidence:"low"};
  }
  if(!c||c.length<12)return null;
  const vols=c.slice(-11,-1).map(x=>x.v);
  const med=_median(vols);
  if(med<=0)return null;
  const currentVol=c[c.length-1].v;
  const rawRatio=currentVol/med;
  if(rawRatio>=0.5)return{projected:+rawRatio.toFixed(2),raw:currentVol,confidence:"high"};
  return{projected:+rawRatio.toFixed(2),raw:currentVol,confidence:"low"};
}
function _pc(c,n=1){if(!c||c.length<n+1)return 0;const p=c[c.length-1-n].c,cu=c[c.length-1].c;return p>0?+((cu-p)/p*100).toFixed(2):0}

// ATR (Average True Range)
function _atr(c,p=14){
  if(!c||c.length<p+1)return null;
  const trs=[];
  for(let i=1;i<c.length;i++){
    const tr=Math.max(c[i].h-c[i].l,Math.abs(c[i].h-c[i-1].c),Math.abs(c[i].l-c[i-1].c));
    trs.push(tr);
  }
  if(trs.length<p)return null;
  return+(trs.slice(-p).reduce((a,x)=>a+x,0)/p).toFixed(2);
}

// ATR as percentage of price
function _atrPct(c,p=14){
  const atr=_atr(c,p);if(!atr)return null;
  const price=c[c.length-1].c;
  return price>0?+(atr/price*100).toFixed(2):null;
}

// BB Width (squeeze detection)
function _bbWidth(c,p=20){
  if(!c||c.length<p+20)return null;
  const widths=[];
  for(let i=p;i<=c.length;i++){
    const b=_bb(c.slice(0,i),p);
    if(b)widths.push(b.w);
  }
  if(widths.length<20)return null;
  const current=widths[widths.length-1];
  const min20=Math.min(...widths.slice(-20));
  const max20=Math.max(...widths.slice(-20));
  const range=max20-min20||1;
  const percentile=+((current-min20)/range*100).toFixed(0);
  return{current:+current.toFixed(2),min20:+min20.toFixed(2),percentile,isSqueeze:percentile<15,isExpanding:widths.length>=3&&widths[widths.length-1]>widths[widths.length-2]&&widths[widths.length-2]>widths[widths.length-3]};
}

// Volume sequence (flexible: 75% threshold) — excludes last incomplete candle
function _volSeq(c,n=4){
  if(!c||c.length<n+2)return{growing:false,declining:false,count:0};
  const completed=c.slice(-(n+1),-1); // last N completed candles (exclude current)
  let gCount=0,dCount=0;
  for(let i=1;i<completed.length;i++){
    if(completed[i].v>completed[i-1].v*0.95)gCount++;
    if(completed[i].v<completed[i-1].v*1.05)dCount++;
  }
  const threshold=Math.ceil((n-1)*0.75);
  return{growing:gCount>=threshold,declining:dCount>=threshold,count:gCount>=threshold?gCount:dCount>=threshold?-dCount:0};
}

// GAP analysis — today open vs yesterday close
function _gap(cD,atrPct){
  if(!cD||cD.length<2)return null;
  const today=cD[cD.length-1],yesterday=cD[cD.length-2];
  const gapPct=+((today.o-yesterday.c)/yesterday.c*100).toFixed(2);
  const atr=atrPct||2;
  const significant=Math.abs(gapPct)>atr*0.5;
  return{pct:gapPct,significant,dir:gapPct>0?"bullish":"bearish"};
}

// Opening Range Breakout — high/low of first 2 candles of 15M (9:30-10:00)
function _orb(cM){
  if(!cM||cM.length<10)return null;
  // Find today's first candle by date
  const lastDt=cM[cM.length-1].dt;
  if(!lastDt)return null;
  const today=lastDt.split(" ")[0]||lastDt.split("T")[0];
  const todayCandles=cM.filter(c=>c.dt&&c.dt.startsWith(today));
  if(todayCandles.length<3)return null; // need at least ORB + 1 candle after
  const orb=todayCandles.slice(0,2); // first 2 candles = 30min
  const orbHigh=Math.max(orb[0].h,orb[1].h);
  const orbLow=Math.min(orb[0].l,orb[1].l);
  const current=cM[cM.length-1];
  const breakUp=current.c>orbHigh;
  const breakDown=current.c<orbLow;
  return{high:+orbHigh.toFixed(2),low:+orbLow.toFixed(2),breakUp,breakDown};
}

function calcInd(cD,cH,cM){
  const price=cM?.[cM.length-1]?.c||0,m200=_ma(cD,200);
  const atrPct=_atrPct(cD);
  return{price,ma20D:_ma(cD,20),ma40D:_ma(cD,40),ma100D:_ma(cD,100),ma200D:m200,
    ma20H:_ma(cH,20),ma40H:_ma(cH,40),ma20M:_ma(cM,20),
    bbD:_bb(cD),bbH:_bb(cH),bbM:_bb(cM),
    volM:_vr(cM,true),volH:_vr(cH,true),
    volProjM:_vrProjected(cM,15,true),
    chgD:_pc(cD,1),
    dMA200:m200?+((price-m200)/m200*100).toFixed(2):null,
    atr:_atr(cD),atrPct,
    bbSqM:_bbWidth(cM),bbSqH:_bbWidth(cH),
    volSeqM:_volSeq(cM,4),volSeqH:_volSeq(cH,3),
    gap:_gap(cD,atrPct),
    orb:_orb(cM)
  };
}

function getTimeWeight(){
  try{
    const now=new Date();
    const etStr=now.toLocaleString("en-US",{timeZone:"America/New_York",hour:"numeric",minute:"numeric",hour12:false});
    const[h,m]=etStr.split(":").map(Number);
    const mins=h*60+m;
    if(mins<9*60+45||mins>=16*60)return{w:0,label:"FUERA HORARIO",zone:"closed"};
    if(mins<11*60+30)return{w:1.0,label:"ÓPTIMO",zone:"prime1"};
    if(mins<13*60)return{w:0.9,label:"MODERADO",zone:"moderate"};
    if(mins<14*60)return{w:0.8,label:"ZONA MUERTA",zone:"dead"};
    if(mins<15*60)return{w:1.0,label:"ÓPTIMO",zone:"prime2"};
    return{w:0.9,label:"CUIDADO",zone:"caution"};
  }catch(e){return{w:1.0,label:"—",zone:"unknown"}}
}

function findPivots(c,lb=50,tol=0.003){
  if(!c||c.length<lb)return{r:[],s:[]};
  const rec=c.slice(-lb),hi=[],lo=[];
  for(let i=2;i<rec.length-2;i++){
    if(rec[i].h>rec[i-1].h&&rec[i].h>rec[i-2].h&&rec[i].h>rec[i+1].h&&rec[i].h>rec[i+2].h)hi.push(rec[i].h);
    if(rec[i].l<rec[i-1].l&&rec[i].l<rec[i-2].l&&rec[i].l<rec[i+1].l&&rec[i].l<rec[i+2].l)lo.push(rec[i].l);
  }
  function cluster(arr){if(!arr.length)return[];const sorted=[...arr].sort((a,b)=>a-b),cl=[];let g=[sorted[0]];
    for(let i=1;i<sorted.length;i++){if(Math.abs(sorted[i]-g[0])/g[0]<tol)g.push(sorted[i]);else{cl.push({lv:+(g.reduce((a,b)=>a+b,0)/g.length).toFixed(2),tx:g.length});g=[sorted[i]]}}
    cl.push({lv:+(g.reduce((a,b)=>a+b,0)/g.length).toFixed(2),tx:g.length});return cl.sort((a,b)=>b.tx-a.tx).slice(0,4)}
  return{r:cluster(hi),s:cluster(lo)};
}

function keyLevels(ind,pivD,pivH,price){
  const all=[];
  if(ind.ma20D)all.push({p:ind.ma20D,l:"MA20D",t:price>ind.ma20D?"s":"r"});
  if(ind.ma40D)all.push({p:ind.ma40D,l:"MA40D",t:price>ind.ma40D?"s":"r"});
  if(ind.ma200D)all.push({p:ind.ma200D,l:"MA200D",t:price>ind.ma200D?"s":"r"});
  if(ind.bbH){all.push({p:ind.bbH.u,l:"BB↑1H",t:"r"},{p:ind.bbH.m,l:"BBm1H",t:price>ind.bbH.m?"s":"r"},{p:ind.bbH.l,l:"BB↓1H",t:"s"})}
  if(ind.bbD){all.push({p:ind.bbD.u,l:"BB↑D",t:"r"},{p:ind.bbD.l,l:"BB↓D",t:"s"})}
  pivD.r.forEach(x=>all.push({p:x.lv,l:`PivD(${x.tx}x)`,t:"r"}));
  pivD.s.forEach(x=>all.push({p:x.lv,l:`PivD(${x.tx}x)`,t:"s"}));
  pivH.r.forEach(x=>all.push({p:x.lv,l:`Piv1H(${x.tx}x)`,t:"r"}));
  pivH.s.forEach(x=>all.push({p:x.lv,l:`Piv1H(${x.tx}x)`,t:"s"}));

  const deduped=[],sorted=[...all].sort((a,b)=>a.p-b.p);
  for(const lv of sorted){const ex=deduped.find(d=>Math.abs(d.p-lv.p)/lv.p<0.002);if(!ex)deduped.push(lv);else if(lv.l.includes("Piv"))ex.l+=" +"+lv.l}
  return{r:deduped.filter(l=>l.p>price*1.001).sort((a,b)=>a.p-b.p).slice(0,4),s:deduped.filter(l=>l.p<price*0.999).sort((a,b)=>b.p-a.p).slice(0,4)};
}

// PATTERN DETECTION (with age tracking)
// ═══════════════════════════════════════
function decayW(age){if(age<=1)return 1.0;if(age<=3)return 0.85;if(age<=5)return 0.7;if(age<=10)return 0.4;return 0.2}

function detect(cM,cH,cD,ind){
  const P=[];
  if(!cM?.length||!cH?.length||!cD?.length)return P;

  // Check last 5 candles for patterns (with decay)
  for(let age=0;age<Math.min(5,cM.length-1);age++){
    const idx=cM.length-1-age;
    const L=cM[idx],pv=cM[idx-1];
    if(!L||!pv)continue;
    const decay=decayW(age);
    const rng=L.h-L.l,body=Math.abs(L.o-L.c),uW=L.h-Math.max(L.o,L.c),lW=Math.min(L.o,L.c)-L.l,bull=L.c>=L.o;
    const ageLbl=age>0?` (${age}v atrás)`:"";

    // TRIGGERS (layer 2)
    // BB-dependent patterns ONLY on current candle (age=0)
    if(age===0&&rng>0&&body/rng<.12){
      if(ind.bbM&&L.h>=ind.bbM.u*.998)P.push({tf:"15M",d:`Doji BB sup`,sg:"PUT",w:2,cat:"TRIGGER",age});
      if(ind.bbM&&L.l<=ind.bbM.l*1.002)P.push({tf:"15M",d:`Doji BB inf`,sg:"CALL",w:2,cat:"TRIGGER",age});
    }
    // Pure rejection wicks (any age, no BB dependency)
    if(rng>0&&uW/rng>.6)P.push({tf:"15M",d:`Rechazo sup ${(uW/rng*100).toFixed(0)}%${ageLbl}`,sg:"PUT",w:+(2*decay).toFixed(1),cat:"TRIGGER",age});
    if(rng>0&&lW/rng>.6)P.push({tf:"15M",d:`Rechazo inf ${(lW/rng*100).toFixed(0)}%${ageLbl}`,sg:"CALL",w:+(2*decay).toFixed(1),cat:"TRIGGER",age});
    // Hammer/Shooting Star only on current candle (BB-dependent)
    if(age===0&&rng>0&&lW>body*2&&uW<body*.5&&ind.bbM&&L.l<=ind.bbM.l*1.005)P.push({tf:"15M",d:`Hammer`,sg:"CALL",w:2,cat:"TRIGGER",age});
    if(age===0&&rng>0&&uW>body*2&&lW<body*.5&&ind.bbM&&L.h>=ind.bbM.u*.995)P.push({tf:"15M",d:`Shooting Star`,sg:"PUT",w:2,cat:"TRIGGER",age});

    const pvB=Math.abs(pv.o-pv.c),pvBu=pv.c>=pv.o;
    if(bull&&!pvBu&&L.o<=pv.c&&L.c>=pv.o&&body>pvB*1.1)P.push({tf:"15M",d:`Envolvente alcista${ageLbl}`,sg:"CALL",w:+(3*decay).toFixed(1),cat:"TRIGGER",age});
    if(!bull&&pvBu&&L.o>=pv.c&&L.c<=pv.o&&body>pvB*1.1)P.push({tf:"15M",d:`Envolvente bajista${ageLbl}`,sg:"PUT",w:+(3*decay).toFixed(1),cat:"TRIGGER",age});
  }

  // 1H Engulfing (no decay, current only)
  const lH=cH[cH.length-1],pH=cH[cH.length-2];
  if(lH&&pH){
    const hB=lH.c>=lH.o,hPB=pH.c>=pH.o,hBd=Math.abs(lH.o-lH.c),hPBd=Math.abs(pH.o-pH.c);
    if(hB&&!hPB&&lH.o<=pH.c&&lH.c>=pH.o&&hBd>hPBd*1.1)P.push({tf:"1H",d:"Envolvente alcista 1H",sg:"CALL",w:3,cat:"TRIGGER",age:0});
    if(!hB&&hPB&&lH.o>=pH.c&&lH.c<=pH.o&&hBd>hPBd*1.1)P.push({tf:"1H",d:"Envolvente bajista 1H",sg:"PUT",w:3,cat:"TRIGGER",age:0});
  }

  // Double top/bottom (last 20 candles)
  if(cM.length>=20){
    const rc=cM.slice(-20),hi=[],lo=[];
    for(let i=1;i<rc.length-1;i++){if(rc[i].h>rc[i-1].h&&rc[i].h>rc[i+1].h)hi.push({v:rc[i].h,i});if(rc[i].l<rc[i-1].l&&rc[i].l<rc[i+1].l)lo.push({v:rc[i].l,i})}
    if(hi.length>=2){const[a,b]=hi.slice(-2);if(Math.abs(a.v-b.v)/a.v<.005&&b.i-a.i>=3)P.push({tf:"15M",d:`Doble techo ~$${a.v.toFixed(2)}`,sg:"PUT",w:3,cat:"TRIGGER",age:0})}
    if(lo.length>=2){const[a,b]=lo.slice(-2);if(Math.abs(a.v-b.v)/a.v<.005&&b.i-a.i>=3)P.push({tf:"15M",d:`Doble piso ~$${a.v.toFixed(2)}`,sg:"CALL",w:3,cat:"TRIGGER",age:0})}
  }

  // MA cross 1H
  if(cH.length>=42){
    const m2n=_ma(cH,20),m4n=_ma(cH,40),m2p=_ma(cH.slice(0,-2),20),m4p=_ma(cH.slice(0,-2),40);
    if(m2n&&m4n&&m2p&&m4p){
      if(m2p<m4p&&m2n>m4n)P.push({tf:"1H",d:"Cruce alcista MA20/40",sg:"CALL",w:2,cat:"TRIGGER",age:0});
      if(m2p>m4p&&m2n<m4n)P.push({tf:"1H",d:"Cruce bajista MA20/40",sg:"PUT",w:2,cat:"TRIGGER",age:0});
    }
  }

  // CONFIRMATIONS (layer 3) — pesos desde FIXTURE.confirm_weights (qqq_canonical_v1).
  // VolHigh threshold ahora viene del fixture (volhigh_min_ratio = 1.2, antes hardcoded 1.5).
  const CW=FIXTURE.confirm_weights, DT=FIXTURE.detection_thresholds;
  const L=cM[cM.length-1],pv=cM[cM.length-2];
  if(ind.bbH&&L.c>=ind.bbH.u)P.push({tf:"1H",d:`BB sup 1H ($${ind.bbH.u})`,sg:"PUT",w:CW.BBsup_1H,cat:"CONFIRM",age:0,key:"BBsup_1H"});
  if(ind.bbH&&L.c<=ind.bbH.l)P.push({tf:"1H",d:`BB inf 1H ($${ind.bbH.l})`,sg:"CALL",w:CW.BBinf_1H,cat:"CONFIRM",age:0,key:"BBinf_1H"});
  if(ind.bbD&&L.c>=ind.bbD.u)P.push({tf:"D",d:`BB sup D ($${ind.bbD.u})`,sg:"PUT",w:CW.BBsup_D,cat:"CONFIRM",age:0,key:"BBsup_D"});
  if(ind.bbD&&L.c<=ind.bbD.l)P.push({tf:"D",d:`BB inf D ($${ind.bbD.l})`,sg:"CALL",w:CW.BBinf_D,cat:"CONFIRM",age:0,key:"BBinf_D"});
  if(ind.volM>=DT.volhigh_min_ratio)P.push({tf:"15M",d:`Vol ${ind.volM}x avg`,sg:"CONFIRM",w:CW.VolHigh,cat:"CONFIRM",age:0,key:"VolHigh"});
  if(ind.volSeqM.growing)P.push({tf:"15M",d:`Vol creciente ${ind.volSeqM.count+1} velas`,sg:"CONFIRM",w:CW.VolSeq,cat:"CONFIRM",age:0,key:"VolSeq"});

  // BB Squeeze: la condición de squeeze pura es informativa (cat=SQUEEZE, w=0); la transición
  // squeeze→expansion sí entra como confirm con peso del fixture (SqExp = 0 en qqq_canonical_v1
  // por hallazgo H-13: el evento es cualitativo pero no agrega edge en backtest, queda visible
  // en patterns para análisis pero no aporta al score).
  if(ind.bbSqH?.isSqueeze)P.push({tf:"1H",d:`BB Squeeze (ancho p${ind.bbSqH.percentile})`,sg:"CONFIRM",w:0,cat:"SQUEEZE",age:0});
  if(ind.bbSqH?.isSqueeze&&ind.bbSqH?.isExpanding)P.push({tf:"1H",d:"Squeeze → Expansión (ruptura)",sg:"CONFIRM",w:CW.SqExp,cat:"CONFIRM",age:0,key:"SqExp"});

  // RISKS (layer 4)
  if(ind.volM<.6&&L&&pv&&L.c>pv.c)P.push({tf:"15M",d:`Rebote vol bajo (${ind.volM}x)`,sg:"WARN",w:-2,cat:"RISK",age:0});
  if(ind.volSeqM.declining&&L&&pv&&L.c>pv.c)P.push({tf:"15M",d:`Vol declinante en rebote`,sg:"WARN",w:-1,cat:"RISK",age:0});

  // Fakeout detection
  if(cM.length>=3){
    const c3=cM[cM.length-3],c2=cM[cM.length-2],c1=cM[cM.length-1];
    // Fakeout above resistance
    if(ind.bbH&&c2.h>ind.bbH.u&&c2.c<ind.bbH.u&&c1.c<ind.bbH.u)
      P.push({tf:"15M",d:`Fakeout sobre BB sup 1H`,sg:"WARN",w:-3,cat:"RISK",age:0});
    // Fakeout below support
    if(ind.bbH&&c2.l<ind.bbH.l&&c2.c>ind.bbH.l&&c1.c>ind.bbH.l)
      P.push({tf:"15M",d:`Fakeout bajo BB inf 1H`,sg:"WARN",w:-3,cat:"RISK",age:0});
  }

  return P;
}

// LAYERED SCORING ENGINE
// ═══════════════════════════════════════
function trend(c,m20,m40){if(!c?.length||!m20||!m40)return"neutral";const p=c[c.length-1].c;return p>m20&&m20>m40?"bullish":p<m20&&m20<m40?"bearish":"neutral"}
function trendSlope(c,m20){
  // Fallback when MA40 unavailable: use MA20 slope
  if(!c?.length||!m20)return"neutral";
  const p=c[c.length-1].c;
  const m20prev=c.length>=25?+((c.slice(-25,-5).reduce((a,x)=>a+x.c,0)/20)).toFixed(2):null;
  if(!m20prev)return p>m20?"bullish":p<m20?"bearish":"neutral";
  if(p>m20&&m20>m20prev)return"bullish";
  if(p<m20&&m20<m20prev)return"bearish";
  return"neutral";
}

// BAND RESOLUTION — port de backend/engines/scoring/bands.py:resolve_band
// Lee FIXTURE.score_bands ordenado high→low. Devuelve la primera banda donde
// score >= min y (max=null o score < max). Score < min de la banda más baja → NEUTRAL.
// ═══════════════════════════════════════
function resolveBand(score){
  for(const b of FIXTURE.score_bands){
    if(score>=b.min&&(b.max===null||score<b.max))return{label:b.label,signal:b.signal};
  }
  return{label:"—",signal:"NEUTRAL"};
}
// Mapping label → CSS class para chips de confianza.
function confClass(c){
  return({"S+":"cSp","S":"cS","A+":"cAp","A":"cA","B":"cB","REVISAR":"cR"})[c]||"cN";
}

// ═══════════════════════════════════════
// LAYERED SCORING — fórmula motor V5 (paridad estricta con qqq_canonical_v1)
// ═══════════════════════════════════════
// score = trigger_sum + confirm_sum  (H-02 del scoring engine spec).
//
// Diferencias vs scanner v4.2.1 (todas las cosas que SACAMOS del cálculo del
// score y movimos a "contexto informativo" en el modal):
//   - volMult (×1.5/×1.3/×0.5 según vol intraday): el canonical ya pondera
//     VolHigh con weight=2 — multiplicar otra vez sería double-counting.
//   - effectiveTimeW (zona horaria ET): time-of-day no es parte de la
//     calibración Observatory.
//   - bonus FzaRel/pivote: FzaRel ya tiene confirm con weight=4 → double-count.
//   - risks (peso negativo): siguen detectándose y mostrándose, pero NO restan
//     del score (gotcha #7 de CLAUDE.md). El conflict gate sigue invalidando.
//
// Lo que SE MANTIENE del v4 (también está en V5 spec):
//   - Structure gate: alineación >= 2/3.
//   - Catalyst override: bypass del gate si needsCat AND 15M==1H AND ≠neutral.
//   - Trigger gate: ≥1 trigger del lado correcto.
//   - Conflict gate: si PUT_w > 0 AND CALL_w > 0 AND |diff| < 2 → BLOQUEADO.
function layeredScore(patterns,alignment,ind,divSPY,secRel,keyLvls,needsCat,tM,tH){
  const timeW=getTimeWeight();
  const layers={structure:{pass:false,reason:"",override:false},trigger:{pass:false,count:0,sum:0},confirm:{sum:0,volMult:1.0,bonus:0,items:[]},risk:{sum:0,items:[],blocked:false,conflictInfo:null}};

  // ── LAYER 1 · STRUCTURE ───────────────────────────────────────
  if(alignment.n>=2){layers.structure.pass=true;layers.structure.reason=`${alignment.n}/3 ${alignment.dir}`}
  else{layers.structure.pass=false;layers.structure.reason=`${alignment.n}/3 insuficiente`}

  // Catalyst override: bypass del gate si hay catalyst + 15M==1H ≠ neutral.
  if(!layers.structure.pass&&needsCat&&tM&&tH&&tM!=="neutral"&&tM===tH){
    layers.structure.pass=true;
    layers.structure.override=true;
    layers.structure.reason=`⚠️OVERRIDE ${alignment.n}/3 (15M+1H:${tM}, catalizador)`;
    alignment={n:2,dir:tM==="bearish"?"bearish":"bullish"};
  }

  if(!layers.structure.pass){
    return{score:0,conf:"—",signal:"NEUTRAL",band:null,layers,timeW,blocked:"Alineación insuficiente"};
  }

  const dir=alignment.dir==="bearish"?"PUT":"CALL";

  // ── LAYER 2 · TRIGGERS ────────────────────────────────────────
  const triggers=patterns.filter(p=>p.cat==="TRIGGER"&&p.sg===dir);
  layers.trigger.count=triggers.length;
  layers.trigger.sum=+triggers.reduce((a,p)=>a+p.w,0).toFixed(1);
  layers.trigger.pass=triggers.length>=1;

  if(!layers.trigger.pass){
    return{score:0,conf:"—",signal:"NEUTRAL",band:null,layers,timeW,dir,blocked:"Sin trigger de entrada"};
  }

  // ── LAYER 3 · CONFIRMS (suman al score) ───────────────────────
  const confirms=patterns.filter(p=>p.cat==="CONFIRM"&&(p.sg===dir||p.sg==="CONFIRM"));
  layers.confirm.sum=+confirms.reduce((a,p)=>a+p.w,0).toFixed(1);

  // Vol multiplier y bonus se calculan SOLO para mostrar como contexto en el modal — NO entran al score.
  if(ind.volM>=2.0)layers.confirm.volMult=1.5;
  else if(ind.volM>=1.5)layers.confirm.volMult=1.3;
  else if(ind.volM<0.6)layers.confirm.volMult=0.5;
  else layers.confirm.volMult=1.0;
  let bonusCtx=0;
  if(secRel&&((dir==="PUT"&&secRel.diff<-0.5)||(dir==="CALL"&&secRel.diff>0.5)))bonusCtx+=1;
  const nearPivot=dir==="PUT"
    ? keyLvls.r.find(l=>l.l.includes("Piv")&&Math.abs(ind.price-l.p)/l.p<0.01)
    : keyLvls.s.find(l=>l.l.includes("Piv")&&Math.abs(ind.price-l.p)/l.p<0.01);
  if(nearPivot)bonusCtx+=1;
  layers.confirm.bonus=bonusCtx;

  // ── LAYER 4 · RISKS (informativos) + CONFLICT GATE ────────────
  const risks=patterns.filter(p=>p.cat==="RISK");
  layers.risk.sum=+risks.reduce((a,p)=>a+p.w,0).toFixed(1);
  layers.risk.items=risks;
  // Conflict gate (bloquea — única forma en que un risk afecta el resultado).
  const putW=patterns.filter(p=>p.cat==="TRIGGER"&&p.sg==="PUT").reduce((a,p)=>a+p.w,0);
  const callW=patterns.filter(p=>p.cat==="TRIGGER"&&p.sg==="CALL").reduce((a,p)=>a+p.w,0);
  const diff=Math.abs(putW-callW);
  if(putW>0&&callW>0){
    layers.risk.conflictInfo={put:+putW.toFixed(1),call:+callW.toFixed(1),diff:+diff.toFixed(1)};
    if(diff<2){
      layers.risk.blocked=true;
      return{score:0,conf:"—",signal:"NEUTRAL",band:null,layers,timeW,dir,blocked:`Conflicto PUT(${putW.toFixed(1)})/CALL(${callW.toFixed(1)}) — diff ${diff.toFixed(1)} < 2`};
    }
  }

  // ── FINAL SCORE V5 ───────────────────────────────────────────
  // Fórmula H-02: score = trigger_sum + confirm_sum. Sin volMult, timeW, bonus ni risks.
  const score=+Math.max(0,layers.trigger.sum+layers.confirm.sum).toFixed(1);
  const band=resolveBand(score);

  return{score,conf:band.label,signal:band.signal,band,layers,timeW,dir,blocked:null};
}

// ═══════════════════════════════════════
// MOTOR V5 — PORT LITERAL DE backend/engines/scoring/
// ═══════════════════════════════════════
// Reemplaza la lógica heredada del scanner v4 (detect/layeredScore/trend/etc)
// con el motor V5 backend port bit-a-bit. Las funciones legacy se mantienen
// arriba porque la UI (render/renderDP/genCT/keyLevels) las consume.
//
// Output del V5.analyze() está adaptado para encajar en el shape que
// analyzeAll() del HTML produce (R[t] = {scoring, ind, patterns, aln, ...}).
// Eso permite reemplazar `analyzeAll()` sin tocar la UI.
//
// Garantías de paridad:
//   - Misma fórmula de score (T+C, sin volMult/timeW/bonus/risks).
//   - Mismos detectores (16 triggers, 10 confirms, 4 risks).
//   - Mismas convenciones de decay, loop range, rounding.
//   - Mismo alignment gate (trend_with_fallback con shift de 5 + catalyst override).
//   - Mismas bandas (resolveBand del global, lee FIXTURE.score_bands).
const V5 = (() => {
  // ─── Helpers de candle (triggers/_helpers.py) ────────────────────
  function decay_weight(age) {
    if (age <= 1) return 1.0;
    if (age <= 3) return 0.85;
    if (age <= 5) return 0.7;
    if (age <= 10) return 0.4;
    return 0.2;
  }
  const candle_range = c => c.h - c.l;
  const candle_body = c => Math.abs(c.o - c.c);
  const upper_wick_ = c => c.h - Math.max(c.o, c.c);
  const lower_wick_ = c => Math.min(c.o, c.c) - c.l;
  const is_bull = c => c.c >= c.o;
  const age_label = age => age > 0 ? ` (${age}v atrás)` : "";
  const round2 = v => Math.round(v * 100) / 100;
  const round1 = v => Math.round(v * 10) / 10;

  // ─── Indicators (indicators/*.py) ────────────────────────────────
  function sma(values, window) {
    const n = values.length;
    const result = new Array(n).fill(null);
    if (n < window) return result;
    for (let i = window - 1; i < n; i++) {
      let s = 0;
      for (let j = i - window + 1; j <= i; j++) s += values[j];
      result[i] = round2(s / window);
    }
    return result;
  }

  function pstdev(arr) {
    const n = arr.length;
    if (n === 0) return 0;
    const m = arr.reduce((a, b) => a + b, 0) / n;
    let s = 0;
    for (const v of arr) s += (v - m) * (v - m);
    return Math.sqrt(s / n);
  }

  function bollinger_bands(values, window = 20, k = 2.0) {
    const n = values.length;
    const lower = new Array(n).fill(null);
    const middle = new Array(n).fill(null);
    const upper = new Array(n).fill(null);
    if (n < window) return [lower, middle, upper];
    for (let i = window - 1; i < n; i++) {
      const win = values.slice(i - window + 1, i + 1);
      const m = win.reduce((a, b) => a + b, 0) / window;
      const sd = pstdev(win);
      middle[i] = round2(m);
      upper[i] = round2(m + k * sd);
      lower[i] = round2(m - k * sd);
    }
    return [lower, middle, upper];
  }

  function _bb_width_at(values, period, k) {
    const win = values.slice(-period);
    const sd = pstdev(win);
    return round2(2 * k * sd);
  }

  function bb_width(values, period = 20, k = 2.0) {
    if (!values || values.length < period + 20) return null;
    const widths = [];
    for (let i = period; i <= values.length; i++) {
      widths.push(_bb_width_at(values.slice(0, i), period, k));
    }
    if (widths.length < 20) return null;
    const current = widths[widths.length - 1];
    const last20 = widths.slice(-20);
    const min20 = Math.min(...last20);
    const max20 = Math.max(...last20);
    const rng = (max20 - min20) || 1;
    const percentile = Math.round((current - min20) / rng * 100);
    return {
      current: round2(current),
      min20: round2(min20),
      percentile,
      isSqueeze: percentile < 15,
      isExpanding: widths.length >= 3
        && widths[widths.length - 1] > widths[widths.length - 2]
        && widths[widths.length - 2] > widths[widths.length - 3],
    };
  }

  function true_range(c, prev_close) {
    if (prev_close == null) return c.h - c.l;
    return Math.max(c.h - c.l, Math.abs(c.h - prev_close), Math.abs(c.l - prev_close));
  }

  function atr_v5(candles, window = 14) {
    const n = candles.length;
    const result = new Array(n).fill(null);
    if (n === 0 || n < window) return result;
    const trs = [];
    let prev_close = null;
    for (const c of candles) {
      trs.push(true_range(c, prev_close));
      prev_close = c.c;
    }
    let seed = 0;
    for (let i = 0; i < window; i++) seed += trs[i];
    seed = seed / window;
    result[window - 1] = round2(seed);
    let prev = seed;
    for (let i = window; i < n; i++) {
      const curr = (prev * (window - 1) + trs[i]) / window;
      result[i] = round2(curr);
      prev = curr;
    }
    return result;
  }

  function today_candles_v5(candles, sim_date) {
    if (!candles || !candles.length) return [];
    let date = sim_date;
    if (date == null) {
      const last_dt = candles[candles.length - 1].dt;
      if (last_dt.includes(" ")) date = last_dt.split(" ")[0];
      else if (last_dt.includes("T")) date = last_dt.split("T")[0];
      else date = last_dt;
    }
    return candles.filter(c => c.dt && c.dt.startsWith(date));
  }

  function median_(arr) {
    if (!arr.length) return 0;
    const s = [...arr].sort((a, b) => a - b);
    const mid = Math.floor(s.length / 2);
    return s.length % 2 ? s[mid] : (s[mid - 1] + s[mid]) / 2;
  }

  function vol_ratio_intraday(candles, sim_date) {
    const tc = today_candles_v5(candles, sim_date);
    if (tc.length < 4) return 1.0;
    const completed = tc[tc.length - 2];
    const vols = tc.slice(0, -2).map(c => c.v);
    const med = median_(vols);
    if (med <= 0) return 1.0;
    return round2(completed.v / med);
  }

  function vol_sequence(candles, n = 4) {
    if (!candles || candles.length < n + 2) return { growing: false, declining: false, count: 0 };
    const completed = candles.slice(-(n + 1), -1);
    let g = 0, d = 0;
    for (let i = 1; i < completed.length; i++) {
      if (completed[i].v > completed[i - 1].v * 0.95) g++;
      if (completed[i].v < completed[i - 1].v * 1.05) d++;
    }
    const threshold = Math.ceil((n - 1) * 0.75);
    const growing = g >= threshold;
    const declining = d >= threshold;
    if (growing) return { growing: true, declining: false, count: g };
    if (declining) return { growing: false, declining: true, count: -d };
    return { growing: false, declining: false, count: 0 };
  }

  function gap_v5(candles_daily, atr_pct_val) {
    if (!candles_daily || candles_daily.length < 2) return null;
    const today = candles_daily[candles_daily.length - 1];
    const yesterday = candles_daily[candles_daily.length - 2];
    const gap_pct = round2((today.o - yesterday.c) / yesterday.c * 100);
    const atr_val = atr_pct_val || 2;
    const significant = Math.abs(gap_pct) > atr_val * 0.5;
    return { pct: gap_pct, significant, dir: gap_pct > 0 ? "bullish" : "bearish" };
  }

  function pct_change(candles, n = 1) {
    if (!candles || candles.length < n + 1) return 0.0;
    const prev = candles[candles.length - 1 - n].c;
    const cur = candles[candles.length - 1].c;
    if (prev <= 0) return 0.0;
    return round2((cur - prev) / prev * 100);
  }

  // ─── Alignment (alignment.py) ────────────────────────────────────
  function trend_strict(price, ma20, ma40) {
    if (ma20 == null || ma40 == null) return "neutral";
    if (price > ma20 && ma20 > ma40) return "bullish";
    if (price < ma20 && ma20 < ma40) return "bearish";
    return "neutral";
  }

  function trend_slope(candles, ma20) {
    if (ma20 == null || !candles.length) return "neutral";
    const price = candles[candles.length - 1].c;
    if (candles.length < 25) {
      if (price > ma20) return "bullish";
      if (price < ma20) return "bearish";
      return "neutral";
    }
    let s = 0;
    for (let i = candles.length - 25; i < candles.length - 5; i++) s += candles[i].c;
    const ma20_prev = round2(s / 20);
    if (price > ma20 && ma20 > ma20_prev) return "bullish";
    if (price < ma20 && ma20 < ma20_prev) return "bearish";
    return "neutral";
  }

  function trend_with_fallback(candles, ma20, ma40) {
    if (ma40 == null) return trend_slope(candles, ma20);
    if (!candles.length) return "neutral";
    const price = candles[candles.length - 1].c;
    const strict = trend_strict(price, ma20, ma40);
    if (strict !== "neutral" || ma20 == null) return strict;
    if (price > ma20 && price > ma40 && trend_slope(candles, ma20) === "bullish") return "bullish";
    if (price < ma20 && price < ma40 && trend_slope(candles, ma20) === "bearish") return "bearish";
    return "neutral";
  }

  function compute_alignment(t15, t1h, td) {
    const ts = [t15, t1h, td];
    const bc = ts.filter(x => x === "bearish").length;
    const uc = ts.filter(x => x === "bullish").length;
    if (bc >= 3) return [3, "bearish"];
    if (uc >= 3) return [3, "bullish"];
    if (bc >= 2) return [2, "bearish"];
    if (uc >= 2) return [2, "bullish"];
    return [Math.max(bc, uc), "mixed"];
  }

  function alignment_gate(t15, t1h, td, has_catalyst = false) {
    const [n, direction] = compute_alignment(t15, t1h, td);
    if (n >= 2 && direction !== "mixed") {
      return { passed: true, n, dir: direction, override: false, effective_dir: direction, reason: `${n}/3 ${direction}` };
    }
    if (has_catalyst && t15 !== "neutral" && t15 === t1h) {
      return { passed: true, n, dir: direction, override: true, effective_dir: t15, reason: `OVERRIDE ${n}/3 (15M+1H:${t15}, catalizador)` };
    }
    return { passed: false, n, dir: direction, override: false, effective_dir: null, reason: `${n}/3 insuficiente` };
  }

  // ─── Triggers (triggers/*.py) ────────────────────────────────────
  // Constantes hardcoded — paridad Observatory bit-a-bit.
  const _DOJI_BODY_RATIO_MAX = 0.12;
  const _REJECTION_WICK_RATIO_MIN = 0.6;
  const _HAMMER_LW_OVER_BODY_MIN = 2.0;
  const _HAMMER_UW_OVER_BODY_MAX = 0.5;
  const _DOJI_BB_TOL = 0.002;
  const _HAMMER_BB_TOL = 0.005;
  const _SHOOTING_BB_TOL = 0.005;
  const _ENGULF_BODY_MIN = 1.1;
  const _W_DOJI = 2.0, _W_REJECTION = 2.0, _W_HAMMER = 2.0, _W_SHOOTING = 2.0, _W_ENGULF_15M = 3.0;
  const _W_ENGULF_1H = 3.0;
  const _W_DOUBLE = 3.0;
  const _DOUBLE_TOL = 0.005, _DOUBLE_MIN_GAP = 3, _DOUBLE_LOOKBACK = 20;
  const _W_MA_CROSS = 2.0;
  const _W_ORB = 2.0;
  const _ORB_VOL_MIN = 1.0;
  const _ORB_CUTOFF = "10:30";

  function detect_candle_15m_triggers(candles_15m, bb_15m, max_age = 4) {
    const triggers = [];
    if (!candles_15m || !candles_15m.length) return triggers;
    const n = candles_15m.length;
    const ages = Math.min(max_age + 1, n - 1);
    if (ages <= 0) return triggers;
    const bb_upper = bb_15m ? bb_15m[0] : null;
    const bb_lower = bb_15m ? bb_15m[2] : null;

    for (let age = 0; age < ages; age++) {
      const idx = n - 1 - age;
      const cnd = candles_15m[idx];
      const pv = candles_15m[idx - 1];
      const rng = candle_range(cnd);
      if (rng <= 0) continue;
      const body = candle_body(cnd);
      const u_w = upper_wick_(cnd);
      const l_w = lower_wick_(cnd);
      const bull = is_bull(cnd);
      const decay = decay_weight(age);
      const lbl = age_label(age);

      // Doji BB sup/inf — solo age=0
      if (age === 0 && bb_15m && body / rng < _DOJI_BODY_RATIO_MAX) {
        if (bb_upper != null && cnd.h >= bb_upper * (1 - _DOJI_BB_TOL)) {
          triggers.push({ tf: "15M", d: "Doji BB sup", sg: "PUT", w: _W_DOJI, cat: "TRIGGER", age: 0 });
        }
        if (bb_lower != null && cnd.l <= bb_lower * (1 + _DOJI_BB_TOL)) {
          triggers.push({ tf: "15M", d: "Doji BB inf", sg: "CALL", w: _W_DOJI, cat: "TRIGGER", age: 0 });
        }
      }
      // Rechazos sup/inf — cualquier age con decay
      if (u_w / rng > _REJECTION_WICK_RATIO_MIN) {
        const pct = Math.round(u_w / rng * 100);
        triggers.push({ tf: "15M", d: `Rechazo sup ${pct}%${lbl}`, sg: "PUT", w: round1(_W_REJECTION * decay), cat: "TRIGGER", age });
      }
      if (l_w / rng > _REJECTION_WICK_RATIO_MIN) {
        const pct = Math.round(l_w / rng * 100);
        triggers.push({ tf: "15M", d: `Rechazo inf ${pct}%${lbl}`, sg: "CALL", w: round1(_W_REJECTION * decay), cat: "TRIGGER", age });
      }
      // Hammer / Shooting Star — solo age=0, BB-dependent
      if (age === 0 && bb_15m) {
        if (bb_lower != null && l_w > body * _HAMMER_LW_OVER_BODY_MIN && u_w < body * _HAMMER_UW_OVER_BODY_MAX && cnd.l <= bb_lower * (1 + _HAMMER_BB_TOL)) {
          triggers.push({ tf: "15M", d: "Hammer", sg: "CALL", w: _W_HAMMER, cat: "TRIGGER", age: 0 });
        }
        if (bb_upper != null && u_w > body * _HAMMER_LW_OVER_BODY_MIN && l_w < body * _HAMMER_UW_OVER_BODY_MAX && cnd.h >= bb_upper * (1 - _SHOOTING_BB_TOL)) {
          triggers.push({ tf: "15M", d: "Shooting Star", sg: "PUT", w: _W_SHOOTING, cat: "TRIGGER", age: 0 });
        }
      }
      // Envolvente 15M — cualquier age con decay
      const pv_body = candle_body(pv);
      const pv_bull = is_bull(pv);
      if (bull && !pv_bull && cnd.o <= pv.c && cnd.c >= pv.o && body > pv_body * _ENGULF_BODY_MIN) {
        triggers.push({ tf: "15M", d: `Envolvente alcista${lbl}`, sg: "CALL", w: round1(_W_ENGULF_15M * decay), cat: "TRIGGER", age });
      }
      if (!bull && pv_bull && cnd.o >= pv.c && cnd.c <= pv.o && body > pv_body * _ENGULF_BODY_MIN) {
        triggers.push({ tf: "15M", d: `Envolvente bajista${lbl}`, sg: "PUT", w: round1(_W_ENGULF_15M * decay), cat: "TRIGGER", age });
      }
    }
    return triggers;
  }

  function detect_engulfing_1h(candles_1h) {
    if (candles_1h.length < 2) return [];
    const prev = candles_1h[candles_1h.length - 2];
    const curr = candles_1h[candles_1h.length - 1];
    const cb = candle_body(curr), pb = candle_body(prev);
    const cbull = is_bull(curr), pbull = is_bull(prev);
    const triggers = [];
    if (cbull && !pbull && curr.o <= prev.c && curr.c >= prev.o && cb > pb * _ENGULF_BODY_MIN) {
      triggers.push({ tf: "1H", d: "Envolvente alcista 1H", sg: "CALL", w: _W_ENGULF_1H, cat: "TRIGGER", age: 0 });
    }
    if (!cbull && pbull && curr.o >= prev.c && curr.c <= prev.o && cb > pb * _ENGULF_BODY_MIN) {
      triggers.push({ tf: "1H", d: "Envolvente bajista 1H", sg: "PUT", w: _W_ENGULF_1H, cat: "TRIGGER", age: 0 });
    }
    return triggers;
  }

  function detect_double_patterns_15m(candles_15m) {
    if (candles_15m.length < _DOUBLE_LOOKBACK) return [];
    const recent = candles_15m.slice(-_DOUBLE_LOOKBACK);
    const ph = [], pl = [];
    for (let i = 1; i < recent.length - 1; i++) {
      if (recent[i].h > recent[i - 1].h && recent[i].h > recent[i + 1].h) ph.push([i, recent[i].h]);
      if (recent[i].l < recent[i - 1].l && recent[i].l < recent[i + 1].l) pl.push([i, recent[i].l]);
    }
    const triggers = [];
    if (ph.length >= 2) {
      const [a_idx, a_val] = ph[ph.length - 2];
      const [b_idx, b_val] = ph[ph.length - 1];
      if (a_val > 0 && Math.abs(a_val - b_val) / a_val < _DOUBLE_TOL && b_idx - a_idx >= _DOUBLE_MIN_GAP) {
        triggers.push({ tf: "15M", d: `Doble techo ~$${a_val.toFixed(2)}`, sg: "PUT", w: _W_DOUBLE, cat: "TRIGGER", age: 0 });
      }
    }
    if (pl.length >= 2) {
      const [a_idx, a_val] = pl[pl.length - 2];
      const [b_idx, b_val] = pl[pl.length - 1];
      if (a_val > 0 && Math.abs(a_val - b_val) / a_val < _DOUBLE_TOL && b_idx - a_idx >= _DOUBLE_MIN_GAP) {
        triggers.push({ tf: "15M", d: `Doble piso ~$${a_val.toFixed(2)}`, sg: "CALL", w: _W_DOUBLE, cat: "TRIGGER", age: 0 });
      }
    }
    return triggers;
  }

  function detect_ma_cross_1h(candles_1h) {
    if (candles_1h.length < 42) return [];
    const closes = candles_1h.map(c => c.c);
    const m20cs = sma(closes, 20);
    const m40cs = sma(closes, 40);
    const m20c = m20cs[m20cs.length - 1];
    const m40c = m40cs[m40cs.length - 1];
    const prev = closes.slice(0, -2);
    const m20ps = sma(prev, 20);
    const m40ps = sma(prev, 40);
    const m20p = m20ps[m20ps.length - 1];
    const m40p = m40ps[m40ps.length - 1];
    if ([m20c, m40c, m20p, m40p].some(v => v == null)) return [];
    const triggers = [];
    if (m20p < m40p && m20c > m40c) triggers.push({ tf: "1H", d: "Cruce alcista MA20/40", sg: "CALL", w: _W_MA_CROSS, cat: "TRIGGER", age: 0 });
    if (m20p > m40p && m20c < m40c) triggers.push({ tf: "1H", d: "Cruce bajista MA20/40", sg: "PUT", w: _W_MA_CROSS, cat: "TRIGGER", age: 0 });
    return triggers;
  }

  function _is_orb_time_valid(dt_str) {
    if (dt_str == null) return false;
    try {
      const hhmm = dt_str.slice(11, 16);
      if (hhmm.length !== 5 || hhmm[2] !== ":") return false;
      return hhmm <= _ORB_CUTOFF;
    } catch (e) { return false; }
  }

  function compute_orb_levels(candles_15m) {
    if (!candles_15m || candles_15m.length < 10) return null;
    const last_dt = candles_15m[candles_15m.length - 1].dt;
    if (!last_dt) return null;
    let today;
    if (last_dt.includes(" ")) today = last_dt.split(" ")[0];
    else if (last_dt.includes("T")) today = last_dt.split("T")[0];
    else today = last_dt;
    const tc = candles_15m.filter(c => c.dt && c.dt.startsWith(today));
    if (tc.length < 3) return null;
    const orb_high = Math.max(tc[0].h, tc[1].h);
    const orb_low = Math.min(tc[0].l, tc[1].l);
    const current = candles_15m[candles_15m.length - 1];
    return { high: round2(orb_high), low: round2(orb_low), breakUp: current.c > orb_high, breakDown: current.c < orb_low };
  }

  function detect_orb_triggers_15m(candles_15m, vol_ratio, sim_datetime) {
    let cur_dt = sim_datetime;
    if (cur_dt == null && candles_15m.length) cur_dt = candles_15m[candles_15m.length - 1].dt;
    if (!_is_orb_time_valid(cur_dt)) return [];
    if (vol_ratio != null && vol_ratio < _ORB_VOL_MIN) return [];
    const orb = compute_orb_levels(candles_15m);
    if (orb == null) return [];
    const triggers = [];
    if (orb.breakUp) triggers.push({ tf: "15M", d: `ORB breakout $${orb.high.toFixed(2)}`, sg: "CALL", w: _W_ORB, cat: "TRIGGER", age: 0 });
    if (orb.breakDown) triggers.push({ tf: "15M", d: `ORB breakdown $${orb.low.toFixed(2)}`, sg: "PUT", w: _W_ORB, cat: "TRIGGER", age: 0 });
    return triggers;
  }

  // ─── Confirms (confirms/*.py) ────────────────────────────────────
  function detect_bollinger_confirms(last_close_15m, bb_1h, bb_daily) {
    const out = [];
    if (bb_1h) {
      const [u, m, l] = bb_1h;
      if (last_close_15m >= u) out.push({ tf: "1H", d: `BB sup 1H ($${u})`, sg: "PUT", w: 1.0, cat: "CONFIRM", age: 0 });
      if (last_close_15m <= l) out.push({ tf: "1H", d: `BB inf 1H ($${l})`, sg: "CALL", w: 3.0, cat: "CONFIRM", age: 0 });
    }
    if (bb_daily) {
      const [u, m, l] = bb_daily;
      if (last_close_15m >= u) out.push({ tf: "D", d: `BB sup D ($${u})`, sg: "PUT", w: 1.0, cat: "CONFIRM", age: 0 });
      if (last_close_15m <= l) out.push({ tf: "D", d: `BB inf D ($${l})`, sg: "CALL", w: 1.0, cat: "CONFIRM", age: 0 });
    }
    return out;
  }

  function detect_volume_high_confirm(vol_m) {
    if (vol_m == null || vol_m <= 1.5) return [];
    return [{ tf: "15M", d: `Vol ${vol_m}x avg`, sg: "CONFIRM", w: 2.0, cat: "CONFIRM", age: 0 }];
  }

  function detect_volume_sequence_confirm(vol_seq) {
    if (vol_seq == null || !vol_seq.growing) return [];
    const count = vol_seq.count || 0;
    return [{ tf: "15M", d: `Vol creciente ${count + 1} velas`, sg: "CONFIRM", w: 0.0, cat: "CONFIRM", age: 0 }];
  }

  function detect_squeeze_expansion_confirm(bb_sq_1h) {
    if (bb_sq_1h == null) return [];
    if (!bb_sq_1h.isSqueeze || !bb_sq_1h.isExpanding) return [];
    return [{ tf: "1H", d: "Squeeze → Expansión (ruptura)", sg: "CONFIRM", w: 0.0, cat: "CONFIRM", age: 0 }];
  }

  function detect_gap_confirm(gap_info) {
    if (gap_info == null || !gap_info.significant) return [];
    const pct = gap_info.pct;
    if (gap_info.dir === "bullish") {
      const sign = pct > 0 ? "+" : "";
      return [{ tf: "D", d: `Gap alcista ${sign}${pct}%`, sg: "CALL", w: 1.0, cat: "CONFIRM", age: 0 }];
    }
    return [{ tf: "D", d: `Gap bajista ${pct}%`, sg: "PUT", w: 1.0, cat: "CONFIRM", age: 0 }];
  }

  function detect_fzarel_confirm(a_chg, bench_chg, bench_ticker, alignment_dir) {
    const fires_bull = alignment_dir === "bullish" && a_chg > bench_chg + 0.5;
    const fires_bear = alignment_dir === "bearish" && a_chg < bench_chg - 0.5;
    if (!fires_bull && !fires_bear) return [];
    const diff = round2(a_chg - bench_chg);
    const sign = diff > 0 ? "+" : "";
    return [{ tf: "D", d: `FzaRel ${sign}${diff}% vs ${bench_ticker}`, sg: "CONFIRM", w: 4.0, cat: "CONFIRM", age: 0 }];
  }

  function detect_divspy_confirm(ticker, a_chg, spy_chg) {
    if (ticker === "SPY" || spy_chg === 0) return [];
    const bear = a_chg < -0.5 && spy_chg > 0.3;
    const bull = a_chg > 0.5 && spy_chg < -0.3;
    if (!bear && !bull) return [];
    const sign_a = a_chg > 0 ? "+" : "";
    const sign_spy = spy_chg > 0 ? "+" : "";
    const dir = a_chg > 0 ? "CALL" : "PUT";
    return [{ tf: "D", d: `Div SPY (${ticker}:${sign_a}${a_chg}% vs SPY:${sign_spy}${spy_chg}%) → VERIFICAR CATALIZADOR`, sg: dir, w: 1.0, cat: "CONFIRM", age: 0 }];
  }

  // ─── Categorize + apply weights (confirms/categorize.py) ──────────
  function categorize_confirm(desc) {
    if (desc.startsWith("FzaRel")) return "FzaRel";
    if (desc.startsWith("BB sup D")) return "BBsup_D";
    if (desc.startsWith("BB inf D")) return "BBinf_D";
    if (desc.startsWith("BB sup 1H")) return "BBsup_1H";
    if (desc.startsWith("BB inf 1H")) return "BBinf_1H";
    if (desc.startsWith("Vol creciente")) return "VolSeq";
    if (desc.includes("x avg")) return "VolHigh";
    if (desc.startsWith("Gap")) return "Gap";
    if (desc.startsWith("Squeeze")) return "SqExp";
    if (desc.startsWith("Div SPY")) return "DivSPY";
    return null;
  }

  function apply_confirm_weights(confirms, weights) {
    let total = 0;
    const seen = new Set();
    const items = [];
    for (const c of confirms) {
      const cat = categorize_confirm(c.d);
      if (cat == null || seen.has(cat)) continue;
      seen.add(cat);
      const w = weights[cat] || 0;
      total += w;
      items.push({ category: cat, weight: w, desc: c.d, tf: c.tf || "", sg: c.sg || "" });
    }
    return [round2(total), items];
  }

  // ─── Risks (risks/*.py) ──────────────────────────────────────────
  function detect_volume_risks_15m(candles_15m, vol_ratio, vol_seq_declining = false) {
    const risks = [];
    if (candles_15m.length < 2) return risks;
    const curr = candles_15m[candles_15m.length - 1];
    const prev = candles_15m[candles_15m.length - 2];
    if (!(curr.c > prev.c)) return risks;
    if (vol_ratio != null && vol_ratio < 0.6) {
      risks.push({ tf: "15M", d: `Rebote vol bajo (${vol_ratio}x)`, sg: "WARN", w: -2.0, cat: "RISK", age: 0 });
    }
    if (vol_seq_declining) {
      risks.push({ tf: "15M", d: "Vol declinante en rebote", sg: "WARN", w: -1.0, cat: "RISK", age: 0 });
    }
    return risks;
  }

  function detect_bb_fakeouts_15m(candles_15m, bb_1h) {
    if (bb_1h == null || candles_15m.length < 3) return [];
    const bb_upper = bb_1h[0], bb_lower = bb_1h[2];
    const c2 = candles_15m[candles_15m.length - 2];
    const c1 = candles_15m[candles_15m.length - 1];
    const risks = [];
    if (c2.h > bb_upper && c2.c < bb_upper && c1.c < bb_upper) {
      risks.push({ tf: "15M", d: "Fakeout sobre BB sup 1H", sg: "WARN", w: -3.0, cat: "RISK", age: 0 });
    }
    if (c2.l < bb_lower && c2.c > bb_lower && c1.c > bb_lower) {
      risks.push({ tf: "15M", d: "Fakeout bajo BB inf 1H", sg: "WARN", w: -3.0, cat: "RISK", age: 0 });
    }
    return risks;
  }

  // ─── Ind builder (ind_builder.py) ────────────────────────────────
  function _last_bb_tuple(bb_series) {
    const [lower, middle, upper] = bb_series;
    const lo = lower.length ? lower[lower.length - 1] : null;
    const mi = middle.length ? middle[middle.length - 1] : null;
    const up = upper.length ? upper[upper.length - 1] : null;
    if (lo == null || mi == null || up == null) return null;
    return [up, mi, lo];
  }

  function build_ind_bundle(cD, cH, cM, spyD, benchD, sim_date) {
    const price = cM[cM.length - 1].c;
    const closes_1h = cH.map(c => c.c);
    const closes_d = cD.map(c => c.c);
    const bb_1h = _last_bb_tuple(bollinger_bands(closes_1h, 20, 2.0));
    const bb_daily = _last_bb_tuple(bollinger_bands(closes_d, 20, 2.0));
    const bb_sq_1h = bb_width(closes_1h, 20, 2.0);
    const atr_series = atr_v5(cD);
    const atr_daily = atr_series.length ? atr_series[atr_series.length - 1] : null;
    let atr_pct = null;
    if (atr_daily != null && price > 0) atr_pct = round2(atr_daily / price * 100);
    const gap_info = gap_v5(cD, atr_pct);
    const vol_m = vol_ratio_intraday(cM, sim_date);
    const vol_seq_m = vol_sequence(cM, 4);
    const a_chg = pct_change(cD, 1);
    const spy_chg = spyD ? pct_change(spyD, 1) : 0.0;
    const bench_chg = benchD ? pct_change(benchD, 1) : 0.0;
    return { price, bb_1h, bb_daily, bb_sq_1h, gap_info, vol_m, vol_seq_m, a_chg, spy_chg, bench_chg, atr_daily, atr_pct };
  }

  // ─── Pipeline analyze() (analyze.py) ─────────────────────────────
  function analyze(ticker, cD, cH, cM, fixture, spyD, sim_datetime, sim_date, benchD) {
    // Validar mínimos.
    if (cD.length < 210 || cH.length < 80 || cM.length < 50) {
      return { error: true, error_code: "ENG-001", ticker, score: 0, conf: "—", signal: "NEUTRAL", dir: "", blocked: "candles below minimum", layers: null, ind: {}, patterns: [] };
    }
    const closes_15m = cM.map(c => c.c);
    const closes_1h = cH.map(c => c.c);
    const closes_d = cD.map(c => c.c);

    const ma20_15 = sma(closes_15m, 20);
    const ma40_15 = sma(closes_15m, 40);
    const ma20_1h = sma(closes_1h, 20);
    const ma40_1h = sma(closes_1h, 40);
    const ma20_d = sma(closes_d, 20);
    const ma40_d = sma(closes_d, 40);
    const ma20_15_v = ma20_15.length ? ma20_15[ma20_15.length - 1] : null;
    const ma40_15_v = ma40_15.length ? ma40_15[ma40_15.length - 1] : null;
    const ma20_1h_v = ma20_1h.length ? ma20_1h[ma20_1h.length - 1] : null;
    const ma40_1h_v = ma40_1h.length ? ma40_1h[ma40_1h.length - 1] : null;
    const ma20_d_v = ma20_d.length ? ma20_d[ma20_d.length - 1] : null;
    const ma40_d_v = ma40_d.length ? ma40_d[ma40_d.length - 1] : null;

    const t15 = trend_with_fallback(cM, ma20_15_v, ma40_15_v);
    const t1h = trend_with_fallback(cH, ma20_1h_v, ma40_1h_v);
    const td = trend_strict(cD[cD.length - 1].c, ma20_d_v, ma40_d_v);

    const gate = alignment_gate(t15, t1h, td, false);

    const layers = {
      structure: { pass: gate.passed, reason: gate.reason, override: gate.override },
      trends: { t15m: t15, t1h: t1h, tdaily: td },
      alignment: { n: gate.n, dir: gate.dir, effective_dir: gate.effective_dir },
    };

    if (!gate.passed) {
      return _neutral_out(ticker, "Alineación insuficiente", layers, {}, [], "", t15, t1h, td);
    }

    const effective_dir = gate.effective_dir === "bearish" ? "PUT" : "CALL";

    // Indicators para triggers.
    const bb_15m = _last_bb_tuple(bollinger_bands(closes_15m, 20, 2.0));
    const bb_1h = _last_bb_tuple(bollinger_bands(closes_1h, 20, 2.0));
    const vol_ratio = vol_ratio_intraday(cM, sim_date);

    // Triggers (5 detectores → 16 patterns).
    const triggers = [
      ...detect_candle_15m_triggers(cM, bb_15m),
      ...detect_engulfing_1h(cH),
      ...detect_double_patterns_15m(cM),
      ...detect_ma_cross_1h(cH),
      ...detect_orb_triggers_15m(cM, vol_ratio, sim_datetime),
    ];

    // Risks.
    const risks = [
      ...detect_volume_risks_15m(cM, vol_ratio, false),
      ...detect_bb_fakeouts_15m(cM, bb_1h),
    ];

    let patterns = [...triggers, ...risks];

    // Trigger gate.
    const directional_triggers = triggers.filter(t => t.sg === effective_dir);
    const trigger_sum = round2(directional_triggers.reduce((a, t) => a + t.w, 0));
    layers.trigger = { pass: directional_triggers.length >= 1, count: directional_triggers.length, sum: trigger_sum };

    const risk_sum = round2(risks.reduce((a, r) => a + r.w, 0));
    if (!layers.trigger.pass) {
      layers.risk = { sum: risk_sum, blocked: false, items: risks, conflictInfo: null };
      return _neutral_out(ticker, "Sin trigger de entrada", layers, {}, patterns, effective_dir, t15, t1h, td);
    }

    // Conflict gate.
    const put_w = round2(triggers.filter(t => t.sg === "PUT").reduce((a, t) => a + t.w, 0));
    const call_w = round2(triggers.filter(t => t.sg === "CALL").reduce((a, t) => a + t.w, 0));
    const diff = round2(Math.abs(put_w - call_w));
    let conflict_info = null, conflict_blocked = false;
    if (put_w > 0 && call_w > 0) {
      conflict_info = { put: put_w, call: call_w, diff };
      if (diff < 2) conflict_blocked = true;
    }
    layers.risk = { sum: risk_sum, blocked: conflict_blocked, items: risks, conflictInfo: conflict_info };
    if (conflict_blocked) {
      return _neutral_out(ticker, `Conflicto PUT(${put_w})/CALL(${call_w}) — diferencia ${diff} < 2`, layers, {}, patterns, effective_dir, t15, t1h, td);
    }

    // Ind bundle + confirms.
    const ind = build_ind_bundle(cD, cH, cM, spyD, benchD, sim_date);
    const bench_ticker = (fixture.benchmark || fixture.ticker_info?.benchmark || "SPY");
    const bench_chg_for_fzarel = benchD ? ind.bench_chg : ind.spy_chg;

    const confirms = [
      ...detect_bollinger_confirms(ind.price, ind.bb_1h, ind.bb_daily),
      ...detect_volume_high_confirm(ind.vol_m),
      ...detect_volume_sequence_confirm(ind.vol_seq_m),
      ...detect_squeeze_expansion_confirm(ind.bb_sq_1h),
      ...detect_gap_confirm(ind.gap_info),
      ...detect_fzarel_confirm(ind.a_chg, bench_chg_for_fzarel, bench_ticker, gate.effective_dir),
      ...detect_divspy_confirm(ticker, ind.a_chg, ind.spy_chg),
    ];
    patterns = [...triggers, ...risks, ...confirms];

    // Apply weights con dedup.
    const directional_confirms = confirms.filter(c => c.sg === effective_dir || c.sg === "CONFIRM");
    const [confirm_sum, confirm_items] = apply_confirm_weights(directional_confirms, fixture.confirm_weights);
    layers.confirm = { sum: confirm_sum, volMult: 1.0, items: confirm_items, bonus: 0 };

    // Score V5: T + C.
    const raw_score = trigger_sum + confirm_sum;
    const score = round1(Math.max(0, raw_score));

    const band = resolveBand(score);
    if (band.signal === "NEUTRAL") {
      return _neutral_out(ticker, "Score insuficiente — sin banda asignada", layers, ind, patterns, effective_dir, t15, t1h, td, score);
    }

    return {
      ticker,
      score,
      conf: band.label,
      signal: band.signal,
      dir: effective_dir,
      band,
      layers,
      ind,
      patterns,
      blocked: null,
      // Compat con UI del HTML:
      tM: t15, tH: t1h, tD: td,
      aln: { n: gate.n, dir: gate.dir },
      timeW: getTimeWeight(),
    };
  }

  function _neutral_out(ticker, blocked, layers, ind, patterns, dir, t15, t1h, td, score = 0) {
    return {
      ticker,
      score,
      conf: "—",
      signal: "NEUTRAL",
      dir: dir || "",
      band: null,
      layers,
      ind: ind || {},
      patterns: patterns || [],
      blocked,
      tM: t15, tH: t1h, tD: td,
      aln: { n: layers.alignment?.n || 0, dir: layers.alignment?.dir || "mixed" },
      timeW: getTimeWeight(),
    };
  }

  return {
    analyze,
    indicators: { sma, bollinger_bands, bb_width, atr: atr_v5, vol_ratio_intraday, vol_sequence, gap: gap_v5, pct_change, today_candles: today_candles_v5 },
    triggers: { detect_candle_15m_triggers, detect_engulfing_1h, detect_double_patterns_15m, detect_ma_cross_1h, detect_orb_triggers_15m },
    confirms: { detect_bollinger_confirms, detect_volume_high_confirm, detect_volume_sequence_confirm, detect_squeeze_expansion_confirm, detect_gap_confirm, detect_fzarel_confirm, detect_divspy_confirm, categorize_confirm, apply_confirm_weights },
    risks: { detect_volume_risks_15m, detect_bb_fakeouts_15m },
    alignment: { trend_strict, trend_slope, trend_with_fallback, compute_alignment, alignment_gate },
    build_ind_bundle,
  };
})();

// MAIN ANALYSIS — usa V5.analyze() para cada ticker
// ═══════════════════════════════════════
function analyzeAll(raw){
  const R={},spyChg=raw.D.SPY?_pc(raw.D.SPY,1):0;

  WL.forEach(asset=>{
    const t=asset.t,cD=raw.D[t],cH=raw.H[t],cM=raw.M[t];
    if(!cD||!cH||!cM){R[t]={...asset,error:true};return}

    // Fixture: el HTML standalone usa siempre qqq_canonical_v1 (FIXTURE global).
    // Para el motor V5, normalizamos el fixture al shape que parse_fixture espera.
    const fixtureForV5 = {
      confirm_weights: FIXTURE.confirm_weights,
      detection_thresholds: FIXTURE.detection_thresholds,
      score_bands: FIXTURE.score_bands,
      benchmark: FIXTURE.benchmark,
      ticker_info: { benchmark: FIXTURE.benchmark },
    };

    const benchTicker = BENCH[t];
    const benchD = benchTicker && raw.D[benchTicker] ? raw.D[benchTicker] : null;
    const spyD = raw.D.SPY || null;

    // Llamada al motor V5. sim_datetime/sim_date null en live (usa el dt de la última vela).
    const out = V5.analyze(t, cD, cH, cM, fixtureForV5, spyD, null, null, benchD);

    if (out.error) { R[t] = { ...asset, error: true, error_code: out.error_code }; return; }

    // Adaptar shape a lo que la UI consume (R[t]) — combina V5 output + UI extras del v4.
    const aChg = out.ind?.a_chg ?? 0;

    // DivSPY metadata (no parte del scoring V5, pero la UI lo muestra).
    let divSPY = null;
    if (t !== "SPY" && spyChg !== 0) {
      const DT = FIXTURE.detection_thresholds;
      if ((aChg < -DT.divspy_asset_threshold_pct && spyChg > DT.divspy_spy_threshold_pct)
          || (aChg > DT.divspy_asset_threshold_pct && spyChg < -DT.divspy_spy_threshold_pct)) {
        divSPY = { a: aChg, spy: spyChg, type: aChg < 0 ? "bearish" : "bullish" };
      }
    }

    // FzaRel metadata.
    let secRel = null;
    if (benchTicker && benchD) {
      const bChg = _pc(benchD, 1);
      secRel = { a: aChg, b: bChg, tk: benchTicker, diff: +(aChg - bChg).toFixed(2) };
    }

    // Indicators legacy del v4 para la UI (calcInd produce el dict con price/ma/bb/atr/etc).
    const indLegacy = calcInd(cD, cH, cM);

    // Pivots + key levels (UI extras, no afectan al scoring V5).
    const pivD = findPivots(cD, 50, 0.004);
    const pivH = findPivots(cH, 50, 0.003);
    const kLvls = keyLevels(indLegacy, pivD, pivH, indLegacy.price);
    if (indLegacy.orb) {
      if (!indLegacy.orb.breakUp) kLvls.r.push({ p: indLegacy.orb.high, l: "ORB↑" });
      if (!indLegacy.orb.breakDown) kLvls.s.push({ p: indLegacy.orb.low, l: "ORB↓" });
      kLvls.r.sort((a, b) => a.p - b.p); kLvls.r = kLvls.r.slice(0, 5);
      kLvls.s.sort((a, b) => b.p - a.p); kLvls.s = kLvls.s.slice(0, 5);
    }

    const atrPct = indLegacy.atrPct || 2;
    const catThreshold = +(atrPct * 1.5).toFixed(2);
    const needsCat = Math.abs(aChg) > catThreshold || !!divSPY;

    R[t] = {
      ...asset,
      ind: indLegacy,                  // UI usa indLegacy (price, ma*, bb*, atr, gap, orb, vol*).
      patterns: out.patterns,           // patterns del motor V5.
      aln: out.aln,
      tM: out.tM, tH: out.tH, tD: out.tD,
      scoring: {
        score: out.score,
        conf: out.conf,
        signal: out.signal,
        dir: out.dir,
        layers: out.layers,
        timeW: out.timeW,
        blocked: out.blocked,
      },
      chg: aChg,
      needsCat,
      catThreshold,
      divSPY,
      secRel,
      kLvls,
      error: false,
      cM: cM.slice(-20),
    };
  });
  return R;
}

function genCT(d){
  if(d.error)return`${d.t}: ERROR`;
  const i=d.ind,s=d.scoring,L=[];
  const catReasons=[];
  if(Math.abs(d.chg)>d.catThreshold)catReasons.push(`chg>${d.catThreshold}%(1.5xATR)`);
  if(d.divSPY)catReasons.push(`div_SPY`);
  L.push(`${d.t} $${i.price.toFixed(2)} | Chg:${d.chg>0?"+":""}${d.chg}%${d.needsCat?` ⚠️CATALIZADOR(${catReasons.join("+")})`:""}`);

  L.push(`Alin:${d.aln.n}/3 ${d.aln.dir} (15M:${d.tM}|1H:${d.tH}|D:${d.tD})${s.layers.structure.override?" ⚠️OVERRIDE_ALIN":""}`);
  if(i.dMA200!==null)L.push(`dMA200:${i.dMA200>0?"+":""}${i.dMA200}%($${i.ma200D})`);
  if(i.bbH)L.push(`BB1H:$${i.bbH.l}/$${i.bbH.m}/$${i.bbH.u}`);
  L.push(`MAs_D:20=$${i.ma20D||"—"} 40=$${i.ma40D||"—"} 200=$${i.ma200D||"—"}`);
  const projStr=i.volProjM?` velActual:${i.volProjM.projected}x(${i.volProjM.confidence})`:"";
  L.push(`Vol(mediana):15M=${i.volM}x 1H=${i.volH}x${projStr}${i.volSeqM.growing?" ↑secuencia_creciente":""}${i.volSeqM.declining?" ↓secuencia_declinante":""}`);
  if(i.atrPct)L.push(`ATR:${i.atrPct}% ($${i.atr})`);
  if(i.gap&&i.gap.significant)L.push(`GAP:${i.gap.pct>0?"+":""}${i.gap.pct}%(${i.gap.dir})`);
  if(i.orb)L.push(`ORB:$${i.orb.low}-$${i.orb.high}${i.orb.breakUp?" ↑BREAK":i.orb.breakDown?" ↓BREAK":""}`);
  if(i.bbSqH?.isSqueeze)L.push(`⚡SQUEEZE BB 1H (ancho p${i.bbSqH.percentile}${i.bbSqH.isExpanding?" →EXPANSIÓN":""})`);
  if(d.divSPY)L.push(`DIV_SPY:${d.t}=${d.divSPY.a>0?"+":""}${d.divSPY.a}% SPY=${d.divSPY.spy>0?"+":""}${d.divSPY.spy}%`);
  if(d.secRel)L.push(`FzaRel vs ${d.secRel.tk}:${d.secRel.diff>0?"+":""}${d.secRel.diff}%`);
  if(d.kLvls.r.length)L.push(`R:${d.kLvls.r.map(l=>`$${l.p}(${l.l})`).join("|")}`);
  if(d.kLvls.s.length)L.push(`S:${d.kLvls.s.map(l=>`$${l.p}(${l.l})`).join("|")}`);

  // Layered scoring summary — fórmula V5 (score = T+C). Vol/Hora/Bonus son contexto, no entran.
  const conflictStr=s.layers.risk.conflictInfo?` Conflicto:PUT(${s.layers.risk.conflictInfo.put})vCALL(${s.layers.risk.conflictInfo.call})diff:${s.layers.risk.conflictInfo.diff.toFixed(1)}`:"";
  const overrideStr=s.layers.structure.override?" OVERRIDE":"";
  L.push(`[V5] Estructura:${s.layers.structure.pass?"✓":"✗"}${overrideStr} | Triggers:${s.layers.trigger.count}(${s.layers.trigger.sum.toFixed(1)}) | Confirms:+${s.layers.confirm.sum} | Risks:${s.layers.risk.items.length}(info ${s.layers.risk.sum})${conflictStr}`);
  L.push(`[CTX no-score] Vol×${s.layers.confirm.volMult} · Hora×${s.timeW.w}(${s.timeW.label})${s.layers.confirm.bonus?` · Bonus:+${s.layers.confirm.bonus}`:""}`);
  if(s.blocked)L.push(`⛔BLOQUEADO: ${s.blocked}`);

  if(d.patterns.length){L.push(`Pat(${d.patterns.length}):`);d.patterns.forEach(p=>L.push(` [${p.tf}]${p.d}(${p.sg}|${p.cat})w:${p.w}${p.age>0?" decay":""}`))}
  // SCORE: T + C = score → banda. Si QQQ, agregar overlay del backtest.
  const wrLine=(d.t==="QQQ"&&METRICS.by_band[s.conf])?` | WR backtest:${METRICS.by_band[s.conf].wr_pct}% MFE/MAE:${METRICS.by_band[s.conf].mfe_mae} n:${METRICS.by_band[s.conf].n}`:"";
  L.push(`SCORE V5: ${s.layers.trigger.sum.toFixed(1)}+${s.layers.confirm.sum} = ${s.score} | ${s.dir||"—"} | Banda:${s.conf}${wrLine}`);
  L.push(`[fixture: ${FIXTURE.fixture_id} v${FIXTURE.fixture_version}]`);
  return L.join("\n");
}

function svgChart(candles,bbd){if(!candles||candles.length<5)return"";const W=150,H=42,c=candles.slice(-20),aP=c.flatMap(x=>[x.h,x.l]);if(bbd){aP.push(bbd.u,bbd.l)}const mn=Math.min(...aP),mx=Math.max(...aP),rn=mx-mn||1,bW=W/c.length,Y=p=>H-((p-mn)/rn)*(H-4)-2;let s=`<svg width="${W}" height="${H}" style="display:block">`;if(bbd)s+=`<rect x="0" y="${Y(bbd.u)}" width="${W}" height="${Math.max(1,Y(bbd.l)-Y(bbd.u))}" fill="rgba(99,102,241,.08)"/>`;c.forEach((k,idx)=>{const x=idx*bW+bW*.15,w=bW*.7,cl=k.c>=k.o?"#22c55e":"#ef4444",bT=Y(Math.max(k.o,k.c)),bB=Y(Math.min(k.o,k.c));s+=`<line x1="${x+w/2}" y1="${Y(k.h)}" x2="${x+w/2}" y2="${Y(k.l)}" stroke="${cl}" stroke-width=".7"/><rect x="${x}" y="${bT}" width="${w}" height="${Math.max(1,bB-bT)}" fill="${cl}" rx=".3"/>`});return s+"</svg>"}
