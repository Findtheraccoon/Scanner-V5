<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Scanner v5 · Cockpit · Hi-Fi v1</title>

<!--
  Tipografía display/UI: Söhne (pendiente .woff2 en repo).
  Fallback activo: Inter (Google Fonts). Mono: JetBrains Mono (Google Fonts).
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  /* =========================================================
     TOKENS — Scanner v5 · Cockpit hi-fi v1
     ADN: icomat (cromática + tipografía + aire) + runpod (cards/iconos/estados)
     ========================================================= */
  :root {
    /* Base cromática (casi-negro plano) */
    --bg:            #050505;
    --bg-card:       #0a0a0a;
    --bg-card-2:     #0f0f0f;   /* card elevado / highlight sutil */
    --bg-card-sel:   #111111;   /* card seleccionado en watchlist */

    /* Borders hairline (icomat minimal) */
    --border:         rgba(255,255,255,0.08);
    --border-strong:  rgba(255,255,255,0.14);
    --border-dashed:  rgba(255,255,255,0.18);

    /* Texto en tiers */
    --text:         #ffffff;
    --text-dim:     rgba(255,255,255,0.62);
    --text-muted:   rgba(255,255,255,0.38);
    --text-faint:   rgba(255,255,255,0.22);

    /* Acento lima glass */
    --accent:               #9cc80a;
    --accent-bright:        #b8e61a;           /* hover / focus */
    --accent-glass-fill:    rgba(156,200,10,0.10);
    --accent-glass-hover:   rgba(156,200,10,0.18);
    --accent-glass-border:  rgba(156,200,10,0.45);
    --accent-dim:           rgba(156,200,10,0.22);

    /* Semantic (runpod-ish) */
    --ok:     #4ade80;
    --ok-dim: rgba(74,222,128,0.18);
    --warn:   #eab308;
    --warn-dim: rgba(234,179,8,0.18);
    --err:    #ef4444;
    --err-dim:  rgba(239,68,68,0.18);

    /* Candles */
    --candle-up:    #9cc80a;
    --candle-down:  #ffffff;

    /* Radii */
    --r:      6px;
    --r-sm:   4px;
    --r-pill: 999px;

    /* Transitions */
    --t-fast:   .12s ease;
    --t-base:   .2s ease;
    --t-slow:   .35s ease;

    /* Tipografía stacks */
    --font-ui:   'Söhne','Inter',system-ui,-apple-system,sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  /* =========================================================
     RESET + base
     ========================================================= */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { background: var(--bg); }
  body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    font-weight: 400;
    font-size: 13px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  button {
    font-family: inherit;
    color: inherit;
    background: transparent;
    border: none;
    padding: 0;
    cursor: pointer;
  }

  ::selection { background: var(--accent-glass-border); color: var(--bg); }

  /* =========================================================
     TWEAKS PANEL (fixed top-right · switcher de estados)
     Solo en el preview standalone — no va al producto final
     ========================================================= */
  .tweaks {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 50;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 14px 16px;
    min-width: 260px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow:
      0 10px 30px rgba(0,0,0,0.6),
      0 0 0 1px rgba(255,255,255,0.02) inset;
  }
  .tweaks .head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .tweaks .head h4 {
    margin: 0;
    font-family: var(--font-ui);
    font-weight: 600;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text);
  }
  .tweaks .head .v {
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.08em;
    color: var(--text-faint);
  }
  .tweaks .lbl {
    display: block;
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .tweaks .row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .pill {
    font-family: var(--font-ui);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    padding: 6px 10px;
    cursor: pointer;
    transition: color var(--t-fast), border-color var(--t-fast), background var(--t-fast);
  }
  .pill:hover {
    color: var(--text);
    border-color: var(--border-strong);
  }
  .pill.on {
    color: var(--accent);
    background: var(--accent-glass-fill);
    border-color: var(--accent-glass-border);
  }
  .pill.on:hover {
    background: var(--accent-glass-hover);
  }

</head>
<body data-state="normal">

  <!-- =========================================================
       TWEAKS PANEL — switcher de estados del slot (preview only)
       ========================================================= -->
  <aside class="tweaks" aria-label="Tweaks del preview">
    <div class="head">
      <h4>estado del slot</h4>
      <span class="v">v1 · preview</span>
    </div>
    <span class="lbl">data-state</span>
    <div class="row" data-group="state">
      <button class="pill on" data-state="normal">normal</button>
      <button class="pill"    data-state="warmup">warmup</button>
      <button class="pill"    data-state="degraded">degraded</button>
      <button class="pill"    data-state="splus">S+ emitida</button>
      <button class="pill"    data-state="error">error fatal</button>
    </div>
  </aside>

  <!-- Cockpit: se agrega en los micro-bloques siguientes -->

</body>
</html>
